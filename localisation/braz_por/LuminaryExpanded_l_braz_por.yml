l_braz_por:
	# LumEx - Choose Luminary Ethic Trait
		paragon.5001.name:99 "Princípios Norteadores"
		paragon.5001.desc:99 "Quando §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! assume as rédeas do poder, surge uma questão decisiva: qual ética norteadora moldará seu reinado lendário?\n\nO conselho aguarda a declaração do Luminar, ciente de que essa escolha ecoará por todo o império por gerações."
		# Use Vanilla text when able, to keep loc for other languages
		paragon.5001.militarist:99 "$paragon.5021.a$"
		paragon.5001.pacifist:99 "$paragon.5021.e$"
		paragon.5001.authoritarian:99 "$paragon.5021.c$"
		paragon.5001.spiritualist:99 "$paragon.5021.b$"
		paragon.5001.materialist:99 "$paragon.5021.f$"
		paragon.5001.xenophobe:99 "$paragon.5021.g$"
		paragon.5001.xenophile:99 "$paragon.5021.d$"

	# LumEx - Choose Heir Ethic
		paragon.5002.name:99 "Moldando o Herdeiro"
		paragon.5002.desc:99 "Um novo herdeiro foi designado para dar continuidade ao legado de §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!. Antes que §Y[Owner.GetHeirName]§! comece seu treinamento, é preciso tomar uma decisão crucial: qual ética norteadora moldará sua visão de mundo e sua futura liderança?\n\nO Luminar precisa escolher com sabedoria, pois essa escolha definirá o caráter do herdeiro por muitos anos."
		paragon.5002.militarist:99 "$paragon.5001.militarist$"
		paragon.5002.pacifist:99 "$paragon.5001.pacifist$"
		paragon.5002.authoritarian:99 "$paragon.5001.authoritarian$"
		paragon.5002.spiritualist:99 "$paragon.5001.spiritualist$"
		paragon.5002.materialist:99 "$paragon.5001.materialist$"
		paragon.5002.xenophobe:99 "$paragon.5001.xenophobe$"
		paragon.5002.xenophile:99 "$paragon.5001.xenophile$"

	# LumEx - Choose Heir Leader Class
		paragon.5003.name:99 "O Caminho do Herdeiro"
		paragon.5003.desc:99 "Com os princípios norteadores de §Y[Owner.GetHeirName]§! agora estabelecidos, chegou o momento de determinar o rumo de seu treinamento. Será forjado como comandante militar, moldado como cientista brilhante ou preparado como oficial habilidoso?\n\nA escolha do Luminar definirá a especialidade e o papel do herdeiro dentro do império."
		paragon.5003.commander:99 "Treinar como Comandante"
		paragon.5003.scientist:99 "Treinar como Cientista"
		paragon.5003.official:99 "Treinar como Oficial"

	# 40 Year Plan Insight events
		paragon.5324.name:99 "O Plano de 40 Anos"
		paragon.5324.desc:99 "$paragon.beginning.speech$\n\nA fundação foi lançada. O Plano de 40 Anos, aquela grande visão que apresentei no alvorecer do meu reinado, atingiu seu ápice. Nosso povo trabalhou incansavelmente, nossos cientistas ampliaram as fronteiras do conhecimento, e nosso império se ergue à beira da grandeza.\n\nMas isto não é apenas um fim, é um começo. A infraestrutura que construímos, a expertise que cultivamos, o impulso que reunimos, tudo isso agora nos permite alcançar algo verdadeiramente extraordinário. Avaliei as possibilidades diante de nós, e chegou a hora de escolher qual caminho levará nosso império à próxima era de glória.\n\n$paragon.ending.speech$"

		paragon.5324.expand_armada:99 "Expandir a Armada"
		paragon.5324.expand_armada.tt:99 "Ganhe §Y5000§! $i_alloys$ \nTodas as §YBases Estelares§! são aprimoradas em um nível\nGanhe progresso de pesquisa para a próxima tecnologia de §YBase Estelar§!\nGanhe progresso de pesquisa para a próxima tecnologia de §YCasco de Nave§!"
		paragon.5324.harness_star:99 "Aproveitar a Estrela"
		paragon.5324.harness_star.tt:99 "A Estrela Capital ganha um grande depósito de $i_energy$\nA Estrela Capital ganha um dos depósitos a seguir: $i_volatile_motes$, $i_rare_crystals$, $i_exotic_gases$ ou $i_alloys$\nGanhe progresso de pesquisa para a §YTecnologia de Extração§! correspondente"
		paragon.5324.strategic_resources:99 "Prospectar Recursos Estratégicos"
		paragon.5324.strategic_resources.tt:99 "Ganhe §Y250§! $i_volatile_motes$\nGanhe §Y250§! $i_rare_crystals$\nGanhe §Y250§! $i_exotic_gases$\nGanhe um depósito de $i_volatile_motes$\nGanhe um depósito de $i_rare_crystals$\nGanhe um depósito de $i_exotic_gases$\nGanhe progresso de pesquisa para as três §YTecnologias de Extração§!"
		paragon.5324.living_metal:99 "Descobrir Metal Vivo"
		paragon.5324.living_metal.tt:99 "Ganhe um depósito de $i_living_metal$\nGanhe progresso de pesquisa para a tecnologia de extração de $i_living_metal$"
		paragon.5324.dark_matter:99 "Encontrar Matéria Escura"
		paragon.5324.dark_matter.tt:99 "Ganhe um depósito de $i_dark_matter$\nGanhe progresso de pesquisa para a tecnologia de extração de $i_dark_matter$"
		paragon.5324.zro:99 "Destilar Zro"
		paragon.5324.zro.tt:99 "Ganhe um depósito de $i_zro$\nGanhe progresso de pesquisa para a tecnologia de extração de $i_zro$"

	# 40 Year Plan - Expand Armada event
		paragon.5326.name:99 "A Armada se Expande"
		paragon.5326.desc:99 "$paragon.beginning.speech$\n\nChegou a hora de forjar uma armada digna do nosso destino. Emiti um decreto amplo: cada base estelar em nosso território será aprimorada de imediato, suas defesas reforçadas, suas capacidades expandidas além dos limites atuais. Nossos estaleiros receberam recursos ilimitados para desenvolver a próxima geração de naves de guerra, e nossos arquitetos militares já elaboram planos para fortificações que tornarão nossas fronteiras intransponíveis.\n\nQue a galáxia tome ciência. Onde antes tínhamos postos avançados, agora há fortalezas. Onde lançávamos corvetas, em breve enviaremos couraçados. Nossa força será inegável.\n\n$paragon.ending.speech$"

	# 40 Year Plan - Zro event
		paragon.5327.name:99 "Destilação de Zro"
		paragon.5327.desc:99 "$paragon.beginning.speech$\n\nNossos cientistas detectaram tênues vestígios de Zro, aquela substância das mais enigmáticas, vagando pelo vácuo dentro de nossas fronteiras. Não é um material comum: desafia a física convencional, ressoa com energia psiônica e possui propriedades que mesmo nossas mentes mais brilhantes mal compreendem. Mobilizei nossas naves de pesquisa para localizar sua origem e estabelecer operações de extração imediatamente.\n\nQuer o Zro desvende os segredos da mente, alimente tecnologias além do nosso entendimento atual ou abra portas para realidades ainda inimagináveis, seremos nós a descobri-lo. O universo guarda zelosamente seus mistérios, mas saberemos arrancá-los.\n\n$paragon.ending.speech$"

	# 40 Year Plan - Harness the Star event
		paragon.5328.name:99 "Aproveitando a Estrela"
		paragon.5328.desc:99 "$paragon.beginning.speech$\n\nPor eras, nossa estrela natal arde no vácuo, uma fornalha de potencial ilimitado que mal começamos a explorar. Ordenei aos nossos melhores engenheiros que construam uma rede de coletores de energia avançados em órbita próxima, extraindo poder em escala jamais alcançada por nossa civilização.\n\nMas isso não é tudo. Ao mapear os pontos ideais de coleta, nossos cientistas fizeram uma descoberta notável: oculto na coroa solar há um depósito concentrado de materiais estratégicos, forjado por processos estelares e agora pronto para extração. O que era apenas o nosso sol se tornará o coração pulsante do nosso poderio industrial.\n\n$paragon.ending.speech$"
	
	# Milestone Events
		paragon.5031.name:99 "Um Monumento ao Progresso"
		paragon.5031.desc:99 "$paragon.beginning.speech$\n\nHoje marca um momento decisivo na história do nosso grande império. A conclusão desta megaestrutura é um testemunho da engenhosidade e da determinação do nosso povo. Sob minha liderança visionária, alcançamos o que muitos julgavam impossível, dobrando a própria trama do cosmos à nossa vontade.\n\n$paragon.ending.speech$"
		paragon.5031.a:99 "Um triunfo da engenharia!"

		paragon.5401.name:99 "A Besta Foi Abatida"
		paragon.5401.desc:99 "$paragon.beginning.speech$\n\nUma criatura grande e terrível, um colosso do vácuo, caiu diante do poderio das nossas frotas. Onde outros tremiam, nós nos mantivemos firmes, e sob minha orientação, nossas forças derrubaram o leviatã. Que a galáxia saiba que nenhuma besta, por mais antiga ou temível, está fora do alcance do nosso império.\n\n$paragon.ending.speech$"
		paragon.5401.a:99 "Ninguém pode se opor a nós!"

		paragon.5403.name:99 "Um Mundo Natal Reivindicado"
		paragon.5403.desc:99 "$paragon.beginning.speech$\n\nO mundo natal de uma civilização rival agora carrega a nossa bandeira. Não é mera conquista de território, é o desenraizamento do solo mais sagrado de um povo. Sob minha liderança decisiva, nossos exércitos asseguraram o próprio berço de outra espécie, alterando para sempre o equilíbrio de poder na galáxia.\n\n$paragon.ending.speech$"
		paragon.5403.a:99 "O legado deles agora é nosso!"

		paragon.5405.name:99 "Os Pilares da Cultura"
		paragon.5405.desc:99 "$paragon.beginning.speech$\n\nNossas tradições nos guiaram por gerações, e agora estão plenamente realizadas. Nossa sociedade alcançou uma amplitude de realização cultural raramente vista entre as estrelas. Sob minha tutela, nosso povo explorou todas as vias do pensamento, da filosofia e da prática que tinha à disposição. Erguemo-nos como uma civilização plenamente completa.\n\n$paragon.ending.speech$"
		paragon.5405.a:99 "Nossa cultura é incomparável!"

		paragon.5407.name:99 "Ecos dos Antigos"
		paragon.5407.desc:99 "$paragon.beginning.speech$\n\nDescobrimos os últimos vestígios de uma civilização que nos antecedeu, um precursor cujas conquistas um dia moldaram a própria galáxia. Seus segredos agora são nossos, para que estudemos e preservemos. Sob minha visão, concluímos o maior empreendimento arqueológico da história do nosso povo, ligando nosso futuro a um passado perdido e ancestral.\n\n$paragon.ending.speech$"
		paragon.5407.a:99 "Levamos sua tocha adiante!"

		paragon.5409.name:99 "A Crise Evitada"
		paragon.5409.desc:99 "$paragon.beginning.speech$\n\nA galáxia oscilava à beira do aniquilamento, e ainda assim resistimos. A crise que ameaçava consumir toda a civilização foi derrotada. Sob minha resolução inabalável, nosso império se ergueu como baluarte contra a escuridão. Esta vitória não pertence somente a nós, mas a cada mundo que ainda respira sob as estrelas. Onde inúmeros outros caíram, mantivemos a linha, e ao fazê-lo, garantimos o futuro de toda vida senciente.\n\n$paragon.ending.speech$"
		paragon.5409.a:99 "A galáxia se mantém de pé porque nós mantivemos!"

	# Forgotten Events
		paragon.forgotten.a.2:99 "Soltar alguns \"dissidentes\""
