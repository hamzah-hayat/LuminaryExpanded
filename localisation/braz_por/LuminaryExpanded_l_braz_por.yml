		paragon.forgotten.c.3:99 "Pedir desculpas publicamente."

	# Heir Illness Situation
		paragon_origin_heir_illness:99 "Herdeiro Moribundo"
		paragon_origin_heir_illness_type:99 "$paragon_origin_heir_illness$"
		paragon_origin_heir_illness_desc:99 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! foi acometido por uma doença terminal! Precisamos achar uma cura rapidamente, mas o estado piora a cada dia, médicos e cientistas em todo o império trabalham sem descanso para encontrar uma cura definitiva."
		paragon_origin_heir_illness_monthly_change_tooltip:99 "A doença do herdeiro continua a piorar, somente com os melhores cuidados médicos e pesquisa biológica podemos esperar curá-la a tempo."
		situation_paragon_origin_heir_illness_palliative:99 "Cuidados Paliativos"
		approach_situation_paragon_origin_heir_illness_palliative_tt:99 "Faremos o possível para deixar [Owner.GetHeirName] confortável em seus últimos dias, mas devemos aceitar que não há esperança de cura."
		situation_paragon_origin_heir_illness_medical:99 "Tratamento Médico"
		approach_situation_paragon_origin_heir_illness_medical_tt:99 "Não pouparemos esforços para tratar a doença de [Owner.GetHeirName]. Com médicos de todo o império trabalhando sem descanso, esperamos encontrar uma cura."
		situation_paragon_origin_heir_illness_radical:99 "Intervenção Radical"
		approach_situation_paragon_origin_heir_illness_radical_tt:99 "Cada médico e biólogo do império será mobilizado para salvar [Owner.GetHeirName]. Todas as outras prioridades serão deixadas de lado para salvar o herdeiro do Luminar!"

		situation_heir_illness_dying:99 "O estado de [Owner.GetHeirName] piora, e parece improvável que sobreviva por muito mais tempo."
		situation_heir_illness_steady:99 "O estado de [Owner.GetHeirName] estabilizou, mas uma cura definitiva ainda está fora de alcance."
		situation_heir_illness_recovering:99 "O estado de [Owner.GetHeirName] está melhorando, e há esperança de recuperação total."

		paragon_origin_heir_illness_getting_worse:99 "Gravidade da Doença"
		paragon_origin_heir_illness_medical_approach:99 "Tratamento Médico"
		paragon_origin_heir_illness_radical_approach:99 "Intervenção Radical"

		paragon_origin_heir_illness_doctor_number:99 "Médicos no Império"
		paragon_origin_heir_illness_biologist_number:99 "Biólogos no Império"

		paragon_origin_heir_illness_complete:99 "§G[Owner.GetHeirName] obtém uma recuperação milagrosa§!."
		paragon_origin_heir_illness_fail:99 "§R[Owner.GetHeirName] sucumbe à doença§!."

		paragon.heir.sickness.positive:99 "A §YDoença§! de §Y[owner.GetHeirTitle] [owner.GetHeirName]§! §Gmelhora§!."
		paragon.heir.sickness.negative:99 "A §YDoença§! de §Y[owner.GetHeirTitle] [owner.GetHeirName]§! §Rpiora§!."

		# Events
		# Heir illness outcome events
		paragon.5080.name:99 "Recuperação Milagrosa"
		paragon.5080.desc:99 "§H§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! apareceu em todas as telas do império. Nossa população aguarda o início do pronunciamento.§!\n\nCidadãos do nosso grande império, hoje me apresento diante de vocês vivo, inteiro, e tomado por uma gratidão que as palavras mal conseguem expressar. Não muito tempo atrás, eu jazia à beira da morte, meu corpo falhava, meu futuro era incerto. Estou aqui graças às pessoas extraordinárias que se recusaram a me deixar morrer.\n\nOs médicos que trabalharam noites em claro, os biólogos que ampliaram as próprias fronteiras da ciência, eles são os verdadeiros heróis deste império.\n\nDevo a eles tudo, e este império também. Que seus nomes sejam lembrados, pois é a brilhantismo e devoção deles que mantêm o império em marcha!\n\n$paragon.ending.speech$"
		paragon.5080.a:99 "Vida longa ao [Owner.GetHeirTitle]!"

		paragon.5081.name:99 "Perda Trágica"
		paragon.5081.desc:99 "$paragon.beginning.speech$\n\nHoje me dirijo a vocês não apenas como seu Luminar, mas como um pai despedaçado pelo luto. Meu filho, §Y[Owner.GetHeirName]§!, o futuro deste grande império, foi-nos arrebatado. Não haja dúvida, isso não foi obra do destino. Foram os Reformistas, esses agitadores miseráveis que semearam divisão e minaram nossos esforços a cada passo, que carregam o peso desta tragédia.\n\nA obstrução deles atrasou pesquisas críticas, a sabotagem deles drenou recursos destinados à cura, e agora minha prole jaz fria por causa dessa traição. Juro diante de cada cidadão deste império: a cobrança virá. Suportaremos esta perda, mas nunca esqueceremos quem é o responsável.\n\n$paragon.ending.speech$"
		paragon.5081.a:99 "Os traidores pagarão por isso!"

		# Heir illness progression events
		paragon.5082.name:99 "Grave Recaída"
		paragon.5082.desc:99 "As equipes médicas que cuidam de §Y[owner.GetHeirTitle] [owner.GetHeirName]§! trouxeram notícias sombrias. Durante a noite, os sinais vitais do herdeiro deterioraram drasticamente, e uma nova onda de sintomas que os médicos não previam surgiu.\n\nO regime de tratamento cuidadosamente elaborado, que vinha mantendo a doença sob controle, parece estar falhando, e os médicos correm para ajustar a abordagem antes que a janela de oportunidade se feche por completo.\nEm todo o império, a notícia já começou a se espalhar. Vigílias se formaram diante dos prédios do governo, e o clima na capital ficou sombrio.\n\nFuncionários discutem em silêncio contingências que ninguém ousa pronunciar abertamente."
		paragon.5082.a:99 "Devemos resistir."

		paragon.5083.name:99 "Complicações"
		paragon.5083.desc:99 "Uma cascata de complicações secundárias atingiu §Y[owner.GetHeirTitle] [owner.GetHeirName]§!, agravando um prognóstico já sombrio. O que começou como uma única doença espalhou seus tentáculos por vários sistemas orgânicos, e o corpo do herdeiro luta para se manter em tantas frentes ao mesmo tempo. O médico-chefe relatou que vários tratamentos experimentais tiveram de ser abandonados após desencadear reações adversas, reduzindo consideravelmente as opções restantes."
		paragon.5083.a:99 "Mantenha a esperança."

		paragon.5084.name:99 "Avanço Contra a Doença"
		paragon.5084.desc:99 "As equipes de pesquisa que trabalham sem descanso para salvar §Y[owner.GetHeirTitle] [owner.GetHeirName]§! fizeram uma descoberta crucial. Um novo composto, sintetizado a partir de amostras biológicas coletadas em todo o império, mostrou eficácia notável contra a doença em testes laboratoriais.\n\nOs primeiros testes no herdeiro deram resultados promissores, com sintomas-chave recuando de forma mensurável pela primeira vez desde o início da doença.\n\nA notícia eletrizou o império. Médicos são saudados como heróis, e uma onda de otimismo cauteloso varreu a população.\n\nPela primeira vez em meses, há esperança genuína de que uma cura completa esteja ao alcance."
		paragon.5084.a:99 "Uma cura está ao alcance!"

		paragon.5085.name:99 "Progresso na Cura"
		paragon.5085.desc:99 "Pela primeira vez no que parece uma eternidade, os médicos de §Y[owner.GetHeirTitle] [owner.GetHeirName]§! trouxeram notícias animadoras. A cor do herdeiro voltou, o apetite melhorou, e ele recuperou alguma força, algo impensável há poucas semanas.\nEmbora a equipe médica advirta que o caminho até a recuperação total ainda é longo e incerto, a melhora é inegável.\n\nCidadãos foram às ruas em celebração silenciosa, e mensagens de apoio continuam a chegar de todos os cantos do império."
		paragon.5085.a:99 "Notícias maravilhosas!"

		# Heir working events
		paragon.5086.name:99 "Discurso Público"
		paragon.5086.desc:99 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! deve fazer um grande discurso público diante dos cidadãos da capital. Apesar do desgaste visível causado pela doença, o herdeiro deixou claro que pretende subir ao palco em pessoa. Os médicos alertaram que o esforço físico de tal aparição pode agravar muito seu estado, mas o herdeiro insiste que o povo precisa ver a força do futuro líder.\nO conselho trouxe o assunto diretamente a nós. O que devemos fazer?"
		paragon.5086.a:99 "Permitir que o discurso ocorra como planejado."
		paragon.5086.b:99 "Pré-gravar o discurso."
		paragon.5086.c:99 "Cancelar o discurso."

		paragon.5087.name:99 "Trabalho no Conselho"
		paragon.5087.desc:99 "Dia após dia, §Y[owner.GetHeirTitle] [owner.GetHeirName]§! continua a se exigir incansavelmente, comparecendo a todas as reuniões do conselho, revisando legislações e pronunciando-se sobre assuntos de Estado como se nada estivesse errado. Os membros do conselho notaram as olheiras, a aparência pálida e abatida, os momentos em que ele para no meio da frase para se recompor.\nVários conselheiros expressaram em particular sua preocupação, alertando que essa rotina punitiva está acelerando o declínio do herdeiro. Ainda assim, o herdeiro recusa-se a se afastar, insistindo que seu dever para com o império vem antes do próprio bem-estar. O conselho trouxe o assunto formalmente à nossa atenção. O que devemos fazer?"
		paragon.5087.a:99 "Manter o cronograma de tarefas como está."
		paragon.5087.b:99 "Reduzir a carga de trabalho do herdeiro."
		paragon.5087.c:99 "Dispensar o herdeiro do trabalho do conselho."

		paragon.5088.name:99 "Visita à Colônia"
		paragon.5088.desc:99 "Uma visita diplomática a [reformist_colony.GetName] está há muito tempo na agenda de §Y[owner.GetHeirTitle] [owner.GetHeirName]§!. A colônia tornou-se um foco de sentimento reformista, e a presença pessoal do herdeiro pretendia acalmar tensões e persuadir as lideranças locais a cooperar com o governo central.\nNo entanto, a viagem em si é exaustiva, o estresse das negociações seria imenso, e os médicos do herdeiro alertaram que viajar em seu estado atual envolve sério risco. Por outro lado, cancelar pode encorajar ainda mais os reformistas. O que devemos fazer?"
		paragon.5088.a:99 "Realizar a visita conforme planejado."
		paragon.5088.b:99 "Adiar a visita."
		paragon.5088.c:99 "Cancelar a visita."

		paragon.5089.name:99 "Inspeção da Marinha"
		paragon.5089.desc:99 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! deve realizar uma inspeção formal da frota imperial. A visita foi marcada há meses, uma demonstração de liderança e solidariedade com nossas forças navais que faria o herdeiro percorrer a nave-capitânia, falar com os oficiais e revisar pessoalmente os relatórios de prontidão para combate.\nO almirantado vinha se preparando para a chegada do herdeiro, mas a equipe médica levantou objeções sérias. As exigências físicas de se deslocar por uma nave de guerra, somadas à fadiga das cerimônias, podem levar sua saúde frágil além do limite. O que devemos fazer?"
		paragon.5089.a:99 "Realizar a inspeção conforme planejado."
		paragon.5089.b:99 "Adiar a inspeção."
		paragon.5089.c:99 "Cancelar a inspeção."

		# Luminary Speech events
		# Event which triggers once Luminary maxes trait out
		paragon.5040.name:99 "O Luminar Lendário"
		paragon.5040.desc:99 "$paragon.beginning.speech$\n\nNa mensagem a seguir, [Root.Owner.Ruler.GetName] reflete sobre uma jornada moldada por provações, crescimento e revelação, falando longamente sobre a sabedoria adquirida e a força forjada na adversidade. Relata as lições aprendidas sobre si, seu povo e o vasto universo que habita, tecendo essas reflexões em um senso renovado de propósito. O pronunciamento culmina em uma declaração de intenção, um compromisso de guiar para sempre o império rumo a um futuro radiante e próspero.\n\n$paragon.ending.speech$"
		paragon.5040.a:99 "O Luminar nos guiará!"
		paragon.leader.growth.positive.max:99 "O traço §YLuminar§! de §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Gatingiu seu máximo§!.\n§YO traço Luminar (e os traços de ascensão Luminar) ganham efeitos bônus e nunca diminuirão.§!"

	# LumEx - Post-Fall Ascension Upgrade
		paragon.6041.name:99 "Transcendendo o Aparato"
		paragon.6041.desc:99 "$paragon.beginning.speech$\n\nDurante anos, o Aparato de Sustentação me manteve vivo, uma maravilha da engenharia que prendeu minha consciência a esta carcaça mortal. Mas nosso povo conquistou algo muito maior. Por meio da ascensão, abriu-se um novo caminho, capaz de me libertar dos limites desta máquina e me conceder uma forma digna do império que construí.\n\nA pergunta diante de nós agora é simples: devo permanecer atado ao aparato, ou devo abraçar o futuro que nosso povo desbloqueou?\n\n$paragon.ending.speech$"
		paragon.6041.a:99 "Manter o Aparato."
		paragon.6041.a.tooltip:99 "Meu trono será suficiente. §RAviso: esta escolha não se repetirá§!"
		paragon.6041.b:99 "$paragon.6000.b$"
		paragon.6041.b.tooltip:99 "$paragon.6000.b.tooltip$"
		paragon.6041.c:99 "$paragon.6000.c$"
		paragon.6041.c.tooltip:99 "$paragon.6000.c.tooltip$"
		paragon.6041.d:99 "$paragon.6000.d$"
		paragon.6041.d.tooltip:99 "$paragon.6000.d.tooltip$"
		paragon.6041.e:99 "$paragon.6000.e$"
		paragon.6041.e.tooltip:99 "$paragon.6000.e.tooltip$"

	# LumEx - Convince Reformists Decision
		le_decision_convince_reformists:99 "Convencer os Reformistas"
		le_decision_convince_reformists_desc:99 "O Luminar reúne-se com líderes reformistas a portas fechadas, recorrendo a décadas de confiança e sacrifícios partilhados. Poucos conseguem manter suas convicções diante do peso silencioso de uma lenda viva."
		le_decision_convince_reformists_tt:99 "Um pop §Yigualitário§! deste planeta será convertido para a ética §Yautoritária§!.\n§GSe não restar nenhum pop igualitário§! neste planeta após a conversão, o modificador §YTendências Democráticas§! será §Gremovido§!."

