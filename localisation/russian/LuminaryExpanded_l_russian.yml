l_russian:
	# LumEx - Choose Luminary Ethic Trait
		paragon.5001.name:99 "Руководящие принципы"
		paragon.5001.desc:99 "Когда §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! берёт бразды правления, встаёт ключевой вопрос: какая руководящая этика будет определять его легендарное правление?\n\nСовет ждёт заявления Светоча, понимая, что этот выбор будет отзываться эхом по всей империи на протяжении многих поколений."
		# Use Vanilla text when able, to keep loc for other languages
		paragon.5001.militarist:99 "$paragon.5021.a$"
		paragon.5001.pacifist:99 "$paragon.5021.e$"
		paragon.5001.authoritarian:99 "$paragon.5021.c$"
		paragon.5001.spiritualist:99 "$paragon.5021.b$"
		paragon.5001.materialist:99 "$paragon.5021.f$"
		paragon.5001.xenophobe:99 "$paragon.5021.g$"
		paragon.5001.xenophile:99 "$paragon.5021.d$"

	# LumEx - Choose Heir Ethic
		paragon.5002.name:99 "Воспитание наследника"
		paragon.5002.desc:99 "Назначен новый наследник, который продолжит дело §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!. Прежде чем §Y[Owner.GetHeirName]§! приступит к обучению, необходимо принять ключевое решение: какая руководящая этика сформирует его мировоззрение и будущее лидерство?\n\nСветоч должен выбрать мудро, ибо этот выбор определит характер наследника на долгие годы."
		paragon.5002.militarist:99 "$paragon.5001.militarist$"
		paragon.5002.pacifist:99 "$paragon.5001.pacifist$"
		paragon.5002.authoritarian:99 "$paragon.5001.authoritarian$"
		paragon.5002.spiritualist:99 "$paragon.5001.spiritualist$"
		paragon.5002.materialist:99 "$paragon.5001.materialist$"
		paragon.5002.xenophobe:99 "$paragon.5001.xenophobe$"
		paragon.5002.xenophile:99 "$paragon.5001.xenophile$"

	# LumEx - Choose Heir Leader Class
		paragon.5003.name:99 "Путь наследника"
		paragon.5003.desc:99 "Теперь, когда руководящие принципы §Y[Owner.GetHeirName]§! установлены, пора определить путь его подготовки. Будет ли он выкован в военного командующего, превращён в блестящего учёного или подготовлен как умелый чиновник?\n\nВыбор Светоча определит знания и роль наследника в империи."
		paragon.5003.commander:99 "Обучить как Командующего"
		paragon.5003.scientist:99 "Обучить как Учёного"
		paragon.5003.official:99 "Обучить как Чиновника"

	# 40 Year Plan Insight events
		paragon.5324.name:99 "40-летний план"
		paragon.5324.desc:99 "$paragon.beginning.speech$\n\nФундамент заложен. 40-летний план, та великая идея, которую я провозгласил на заре своего правления, достиг кульминации. Наш народ трудился неустанно, наши учёные раздвигали границы знаний, и наша империя стоит на пороге величия.\n\nНо это не просто конец, это начало. Инфраструктура, что мы возвели, опыт, что мы накопили, импульс, что мы собрали, всё это позволяет нам совершить нечто поистине выдающееся. Я рассмотрел открывающиеся возможности, и пора выбрать, какой путь поведёт нашу империю в её следующую эпоху славы.\n\n$paragon.ending.speech$"

		paragon.5324.expand_armada:99 "Расширить армаду"
		paragon.5324.expand_armada.tt:99 "Получите §Y5000§! $i_alloys$ \nВсе §Yзвёздные базы§! улучшаются на один уровень\nПолучите прогресс исследования следующей технологии §Yзвёздных баз§!\nПолучите прогресс исследования следующей технологии §Yкорпусов кораблей§!"
		paragon.5324.harness_star:99 "Обуздать звезду"
		paragon.5324.harness_star.tt:99 "Столичная звезда получает крупное месторождение $i_energy$\nСтоличная звезда получает одно из месторождений: $i_volatile_motes$, $i_rare_crystals$, $i_exotic_gases$ или $i_alloys$\nПолучите прогресс исследования соответствующей §Yтехнологии добычи§!"
		paragon.5324.strategic_resources:99 "Разведать стратегические ресурсы"
		paragon.5324.strategic_resources.tt:99 "Получите §Y250§! $i_volatile_motes$\nПолучите §Y250§! $i_rare_crystals$\nПолучите §Y250§! $i_exotic_gases$\nПолучите месторождение $i_volatile_motes$\nПолучите месторождение $i_rare_crystals$\nПолучите месторождение $i_exotic_gases$\nПолучите прогресс исследования всех трёх §Yтехнологий добычи§!"
		paragon.5324.living_metal:99 "Открыть живой металл"
		paragon.5324.living_metal.tt:99 "Получите месторождение $i_living_metal$\nПолучите прогресс исследования технологии добычи $i_living_metal$"
		paragon.5324.dark_matter:99 "Найти тёмную материю"
		paragon.5324.dark_matter.tt:99 "Получите месторождение $i_dark_matter$\nПолучите прогресс исследования технологии добычи $i_dark_matter$"
		paragon.5324.zro:99 "Перегонять Зро"
		paragon.5324.zro.tt:99 "Получите месторождение $i_zro$\nПолучите прогресс исследования технологии добычи $i_zro$"

	# 40 Year Plan - Expand Armada event
		paragon.5326.name:99 "Армада расширяется"
		paragon.5326.desc:99 "$paragon.beginning.speech$\n\nПришло время выковать армаду, достойную нашей судьбы. Я издал всеобъемлющий указ: каждая звёздная база на нашей территории будет немедленно улучшена, её защита укреплена, её возможности расширены за пределы текущих границ. Наши кораблестроители получили неограниченные ресурсы для разработки следующего поколения боевых кораблей, а наши военные архитекторы уже составляют планы укреплений, которые сделают наши границы непреступными.\n\nПусть галактика заметит. Где когда-то стояли форпосты, теперь возвышаются крепости. Где мы выводили в поле корветы, скоро поднимем дредноуты. Наша мощь будет неоспоримой.\n\n$paragon.ending.speech$"

	# 40 Year Plan - Zro event
		paragon.5327.name:99 "Перегонка Зро"
		paragon.5327.desc:99 "$paragon.beginning.speech$\n\nНаши учёные обнаружили слабые следы Зро, той самой загадочной субстанции, дрейфующей в пустоте в пределах наших границ. Это не обычный материал, он бросает вызов классической физике, резонирует с псионической энергией и обладает свойствами, которые с трудом понимают даже наши величайшие умы. Я мобилизовал наши научные корабли, чтобы определить источник и немедленно наладить добычу.\n\nРаскроет ли Зро тайны разума, питать ли технологии, превосходящие наше нынешнее понимание, или откроет двери в реальности, что нам только предстоит вообразить, мы будем теми, кто это откроет. Вселенная ревностно охраняет свои тайны, но мы вырвем их у неё.\n\n$paragon.ending.speech$"

	# 40 Year Plan - Harness the Star event
		paragon.5328.name:99 "Обуздание звезды"
		paragon.5328.desc:99 "$paragon.beginning.speech$\n\nЭпохами наша родная звезда пылала в пустоте, печь безграничного потенциала, который мы едва начали использовать. Я приказал нашим лучшим инженерам построить сеть передовых сборщиков энергии на близкой орбите, добывая мощность в масштабе, какого наша цивилизация ещё не достигала.\n\nНо это ещё не всё. В ходе изучения оптимальных точек сбора наши учёные сделали примечательное открытие: в короне звезды скрыто концентрированное месторождение стратегических материалов, выкованное звёздными процессами и теперь готовое к добыче. То, что было лишь нашим солнцем, станет бьющимся сердцем нашей промышленной мощи.\n\n$paragon.ending.speech$"
	
	# Milestone Events
		paragon.5031.name:99 "Памятник прогрессу"
		paragon.5031.desc:99 "$paragon.beginning.speech$\n\nСегодня знаменует решающий момент в истории нашей великой империи. Завершение этой мегаструктуры свидетельствует об изобретательности и решимости нашего народа. Под моим дальновидным руководством мы достигли того, что многие считали невозможным, подчинив самой ткани космоса нашу волю.\n\n$paragon.ending.speech$"
		paragon.5031.a:99 "Триумф инженерной мысли!"

		paragon.5401.name:99 "Зверь повержен"
		paragon.5401.desc:99 "$paragon.beginning.speech$\n\nВеликое и ужасное создание, колосс пустоты, пало перед мощью наших флотов. Там, где другие дрожали, мы стояли твёрдо, и под моим руководством наши силы сразили левиафана. Пусть галактика знает, что ни один зверь, сколь бы древним или грозным он ни был, не вне досягаемости нашей империи.\n\n$paragon.ending.speech$"
		paragon.5401.a:99 "Никто не устоит против нас!"

		paragon.5403.name:99 "Родной мир захвачен"
		paragon.5403.desc:99 "$paragon.beginning.speech$\n\nРодная планета соперничающей цивилизации теперь несёт наше знамя. Это не просто завоевание территории, это вырывание самой священной земли народа. Под моим решительным руководством наши армии заняли саму колыбель другой расы, навсегда изменив баланс сил в галактике.\n\n$paragon.ending.speech$"
		paragon.5403.a:99 "Их наследие теперь наше!"

		paragon.5405.name:99 "Столпы культуры"
		paragon.5405.desc:99 "$paragon.beginning.speech$\n\nНаши традиции вели нас сквозь поколения, и теперь они полностью реализованы. Наше общество достигло такой широты культурных свершений, какая редко встречается среди звёзд. Под моим руководством наш народ исследовал все доступные ему пути мысли, философии и практики. Мы стоим как полностью завершённая цивилизация.\n\n$paragon.ending.speech$"
		paragon.5405.a:99 "Наша культура не имеет равных!"

		paragon.5407.name:99 "Эхо древних"
		paragon.5407.desc:99 "$paragon.beginning.speech$\n\nМы раскрыли последние остатки цивилизации, что предшествовала нам, предтечи, чьи свершения когда-то формировали саму галактику. Их секреты теперь наши, чтобы изучать и сохранять. Под моим видением мы завершили величайшее археологическое начинание в истории нашего народа, связав наше будущее с утраченным и древним прошлым.\n\n$paragon.ending.speech$"
		paragon.5407.a:99 "Мы несём их факел дальше!"

		paragon.5409.name:99 "Кризис предотвращён"
		paragon.5409.desc:99 "$paragon.beginning.speech$\n\nГалактика балансировала на грани уничтожения, и всё же мы выстояли. Кризис, что грозил поглотить всю цивилизацию, побеждён. Под моей непоколебимой решимостью наша империя стала оплотом против тьмы. Эта победа принадлежит не только нам, но и каждому миру, всё ещё дышащему под звёздами. Там, где пали бесчисленные другие, мы удержали рубеж, и тем самым обеспечили будущее всей разумной жизни.\n\n$paragon.ending.speech$"
		paragon.5409.a:99 "Галактика стоит, потому что устояли мы!"

	# Forgotten Events
		paragon.forgotten.a.2:99 "Освободить нескольких «диссидентов»"
		paragon.forgotten.a.3:99 "Подавить СМИ."

		paragon.forgotten.b.2:99 "Умилостивить взятками."
		paragon.forgotten.b.3:99 "Не обращать внимания на обман."

		paragon.forgotten.c.2:99 "Сфабриковать контрдоказательства."
		paragon.forgotten.c.3:99 "Принести публичные извинения."

	# Heir Illness Situation
		paragon_origin_heir_illness:99 "Умирающий наследник"
		paragon_origin_heir_illness_type:99 "$paragon_origin_heir_illness$"
		paragon_origin_heir_illness_desc:99 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! поражён смертельной болезнью! Мы должны срочно найти лекарство, но состояние ухудшается с каждым днём, врачи и учёные по всей империи неустанно работают над поиском окончательного исцеления."
		paragon_origin_heir_illness_monthly_change_tooltip:99 "Болезнь наследника продолжает прогрессировать; лишь лучшая медицинская помощь и биологические исследования дают надежду излечить её вовремя."
		situation_paragon_origin_heir_illness_palliative:99 "Паллиативная помощь"
		approach_situation_paragon_origin_heir_illness_palliative_tt:99 "Мы сделаем всё возможное, чтобы [Owner.GetHeirName] провёл свои последние дни в покое, но должны принять, что надежды на исцеление нет."
		situation_paragon_origin_heir_illness_medical:99 "Медицинское лечение"
		approach_situation_paragon_origin_heir_illness_medical_tt:99 "Мы не пощадим средств для лечения болезни [Owner.GetHeirName]. С врачами по всей империи, работающими без устали, надеемся найти лекарство."
		situation_paragon_origin_heir_illness_radical:99 "Радикальное вмешательство"
		approach_situation_paragon_origin_heir_illness_radical_tt:99 "Каждый врач и биолог империи будет мобилизован, чтобы спасти [Owner.GetHeirName]. Все прочие приоритеты будут отложены ради спасения наследника Светоча!"

		situation_heir_illness_dying:99 "Состояние [Owner.GetHeirName] ухудшается, и кажется маловероятным, что он проживёт ещё долго."
		situation_heir_illness_steady:99 "Состояние [Owner.GetHeirName] стабилизировалось, но окончательное исцеление по-прежнему недоступно."
		situation_heir_illness_recovering:99 "Состояние [Owner.GetHeirName] улучшается, и есть надежда на полное выздоровление."

		paragon_origin_heir_illness_getting_worse:99 "Тяжесть болезни"
		paragon_origin_heir_illness_medical_approach:99 "Медицинское лечение"
		paragon_origin_heir_illness_radical_approach:99 "Радикальное вмешательство"

		paragon_origin_heir_illness_doctor_number:99 "Врачи в империи"
		paragon_origin_heir_illness_biologist_number:99 "Биологи в империи"

		paragon_origin_heir_illness_complete:99 "§G[Owner.GetHeirName] чудесным образом выздоравливает§!."
		paragon_origin_heir_illness_fail:99 "§R[Owner.GetHeirName] поддаётся болезни§!."

		paragon.heir.sickness.positive:99 "§YБолезнь§! §Y[owner.GetHeirTitle] [owner.GetHeirName]§! §Gулучшается§!."
		paragon.heir.sickness.negative:99 "§YБолезнь§! §Y[owner.GetHeirTitle] [owner.GetHeirName]§! §Rусугубляется§!."

		# Events
		# Heir illness outcome events
		paragon.5080.name:99 "Чудесное выздоровление"
		paragon.5080.desc:99 "§H§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! появился на каждом экране в империи. Наше население ждёт начала обращения.§!\n\nГраждане нашей великой империи, я предстаю перед вами сегодня живой, целый и преисполненный благодарности, которую слова едва ли способны выразить. Не так давно я лежал у врат смерти, моё тело отказывало, моё будущее было неясно. Я здесь благодаря выдающимся людям, которые отказались дать мне умереть.\n\nВрачи, что трудились бессонными ночами, биологи, что раздвигали сами границы науки, они и есть истинные герои этой империи.\n\nЯ им обязан всем, и эта империя тоже. Пусть имена их будут запомнены, ведь именно их гений и преданность поддерживают империю!\n\n$paragon.ending.speech$"
		paragon.5080.a:99 "Да здравствует [Owner.GetHeirTitle]!"

		paragon.5081.name:99 "Трагическая утрата"
		paragon.5081.desc:99 "$paragon.beginning.speech$\n\nСегодня я обращаюсь к вам не только как ваш Светоч, но и как родитель, сломленный горем. Моё дитя, §Y[Owner.GetHeirName]§!, будущее этой великой империи, было у нас отнято. Не сомневайтесь, это не было волей судьбы. Это были Реформисты, те жалкие смутьяны, что сеяли раздор и подрывали наши усилия на каждом шагу, кто несёт бремя этой трагедии.\n\nИх обструкция задержала важнейшие исследования, их саботаж лишил ресурсов, предназначенных для лекарства, и теперь мой потомок лежит холоден из-за их предательства. Клянусь перед каждым гражданином этой империи: расплата для них настанет. Мы переживём эту утрату, но никогда не забудем тех, кто за неё в ответе.\n\n$paragon.ending.speech$"
		paragon.5081.a:99 "Предатели за это заплатят!"

		# Heir illness progression events
		paragon.5082.name:99 "Тяжёлый удар"
		paragon.5082.desc:99 "Медицинские бригады, ухаживающие за §Y[owner.GetHeirTitle] [owner.GetHeirName]§!, принесли мрачные вести. За ночь жизненные показатели наследника резко ухудшились, и появилась новая волна симптомов, которой врачи не предвидели.\n\nТщательно выстроенный режим лечения, удерживавший болезнь в узде, по всей видимости даёт сбой, и врачи спешат скорректировать подход прежде, чем окно возможностей закроется полностью.\nПо всей империи весть уже начала распространяться. Перед правительственными зданиями возникли бдения, и настроение в столице стало мрачным.\n\nЧиновники тихо обсуждают сценарии, о которых никто не решается говорить открыто."
		paragon.5082.a:99 "Мы должны держаться."

		paragon.5083.name:99 "Осложнения"
		paragon.5083.desc:99 "Каскад вторичных осложнений обрушился на §Y[owner.GetHeirTitle] [owner.GetHeirName]§!, усугубив и без того тяжёлый прогноз. То, что началось как одна болезнь, протянуло свои щупальца через несколько систем органов, и тело наследника борется на стольких фронтах одновременно. Главный врач сообщил, что несколько экспериментальных методов лечения пришлось оставить после неблагоприятных реакций, что значительно сужает оставшиеся варианты."
		paragon.5083.a:99 "Не теряйте надежды."

		paragon.5084.name:99 "Прорыв в лечении"
		paragon.5084.desc:99 "Исследовательские группы, круглосуточно работающие ради спасения §Y[owner.GetHeirTitle] [owner.GetHeirName]§!, совершили решающее открытие. Новое соединение, синтезированное из биологических образцов, собранных по всей империи, показало замечательную эффективность против болезни в лабораторных испытаниях.\n\nПервые тесты на наследнике дали обнадёживающие результаты, и ключевые симптомы впервые за всё время болезни заметно отступили.\n\nНовость наэлектризовала империю. Врачей чествуют как героев, и волна осторожного оптимизма захлестнула народ.\n\nВпервые за многие месяцы появилась настоящая надежда, что полное исцеление достижимо."
		paragon.5084.a:99 "Лекарство в пределах досягаемости!"

		paragon.5085.name:99 "Прогресс выздоровления"
		paragon.5085.desc:99 "Впервые за то, что кажется вечностью, врачи §Y[owner.GetHeirTitle] [owner.GetHeirName]§! принесли обнадёживающие вести. К наследнику вернулся румянец, аппетит улучшился, и он вернул немного сил, что несколько недель назад казалось немыслимым.\nХотя медицинская команда предупреждает, что путь к полному выздоровлению ещё долог и неизвестен, улучшение неоспоримо.\n\nГраждане вышли на улицы в тихом ликовании, и слова поддержки продолжают поступать со всех уголков империи."
		paragon.5085.a:99 "Прекрасные новости!"

		# Heir working events
		paragon.5086.name:99 "Публичная речь"
		paragon.5086.desc:99 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! должен произнести важное публичное обращение перед гражданами столицы. Несмотря на видимое истощение из-за болезни, наследник дал ясно понять, что намерен подняться на сцену лично. Его врачи предупредили, что физическое напряжение от такого появления может значительно ухудшить его состояние, но наследник настаивает: народ должен видеть силу будущего лидера.\nСовет напрямую обратился к нам с этим вопросом. Что нам делать?"
		paragon.5086.a:99 "Позволить речи состояться, как и было запланировано."
		paragon.5086.b:99 "Записать речь заранее."
		paragon.5086.c:99 "Отменить речь."

		paragon.5087.name:99 "Работа в совете"
		paragon.5087.desc:99 "День за днём §Y[owner.GetHeirTitle] [owner.GetHeirName]§! продолжает изводить себя, посещая каждое заседание совета, рассматривая законы и высказываясь по государственным делам так, словно ничего не происходит. Члены совета заметили тёмные круги под его глазами, бледный и измождённый вид, моменты, когда он замирает посреди фразы, чтобы перевести дух.\nНесколько советников частным образом выразили тревогу, предупреждая, что этот изматывающий график ускоряет упадок наследника. Однако наследник отказывается отступить, настаивая, что долг перед империей выше его собственного благополучия. Совет официально обратил наше внимание на этот вопрос. Что нам делать?"
		paragon.5087.a:99 "Оставить расписание обязанностей без изменений."
		paragon.5087.b:99 "Уменьшить нагрузку наследника."
		paragon.5087.c:99 "Освободить наследника от работы в совете."

		paragon.5088.name:99 "Визит в колонию"
		paragon.5088.desc:99 "Дипломатический визит в [reformist_colony.GetName] давно стоит в графике §Y[owner.GetHeirTitle] [owner.GetHeirName]§!. Колония превратилась в очаг реформистских настроений, и личное присутствие наследника должно было успокоить напряжение и убедить местных лидеров сотрудничать с центральной властью.\nОднако сама поездка изнурительна, стресс от переговоров будет огромен, а врачи наследника предупредили, что путешествие в его нынешнем состоянии несёт серьёзный риск. С другой стороны, отмена может ещё больше воодушевить реформистов. Что нам делать?"
		paragon.5088.a:99 "Провести визит, как и было запланировано."
		paragon.5088.b:99 "Отложить визит."
		paragon.5088.c:99 "Отменить визит."

		paragon.5089.name:99 "Инспекция флота"
		paragon.5089.desc:99 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! должен провести официальную инспекцию имперского флота. Визит был назначен несколько месяцев назад, демонстрация лидерства и солидарности с нашими военно-космическими силами, при которой наследник посетит флагман, обратится к офицерам и лично рассмотрит отчёты о боеготовности.\nАдмиралтейство готовится к прибытию наследника, но его медицинская команда выдвинула серьёзные возражения. Физические нагрузки от перемещений по боевому кораблю в сочетании с усталостью от церемоний могут вывести его хрупкое здоровье за пределы возможного. Что нам делать?"
		paragon.5089.a:99 "Провести инспекцию, как и было запланировано."
		paragon.5089.b:99 "Отложить инспекцию."
		paragon.5089.c:99 "Отменить инспекцию."

		# Luminary Speech events
		# Event which triggers once Luminary maxes trait out
		paragon.5040.name:99 "Легендарный Светоч"
		paragon.5040.desc:99 "$paragon.beginning.speech$\n\nВ следующем послании [Root.Owner.Ruler.GetName] размышляет о пути, выкованном испытаниями, ростом и откровением, подробно говоря о мудрости, обретённой и силе, рождённой в невзгодах. Он повествует об уроках, познанных о себе самом, своём народе и обширной вселенной, в которой обитает, вплетая эти прозрения в обновлённое чувство цели. Обращение достигает кульминации в декларации намерения, в обязательстве вечно вести империю к сияющему и процветающему будущему.\n\n$paragon.ending.speech$"
		paragon.5040.a:99 "Светоч поведёт нас!"
		paragon.leader.growth.positive.max:99 "Черта §YСветоч§! §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Gдостигла своего максимума§!.\n§YЧерта Светоч (и черты вознесения Светоча) получают бонусные эффекты и никогда не уменьшатся.§!"

	# LumEx - Post-Fall Ascension Upgrade
		paragon.6041.name:99 "Превзойти Аппарат"
		paragon.6041.desc:99 "$paragon.beginning.speech$\n\nГодами Поддерживающий Аппарат сохранял мне жизнь, чудо инженерии, привязавшее моё сознание к этой смертной оболочке. Но наш народ совершил нечто гораздо большее. Благодаря нашему вознесению открылся новый путь, способный освободить меня от рамок этой машины и даровать мне форму, достойную империи, что я построил.\n\nВопрос перед нами прост: остаться ли мне привязанным к аппарату, или принять будущее, что наш народ открыл?\n\n$paragon.ending.speech$"
		paragon.6041.a:99 "Сохранить Аппарат."
		paragon.6041.a.tooltip:99 "Моего трона будет достаточно. §RПредупреждение: этот выбор не повторится§!"
		paragon.6041.b:99 "$paragon.6000.b$"
		paragon.6041.b.tooltip:99 "$paragon.6000.b.tooltip$"
		paragon.6041.c:99 "$paragon.6000.c$"
		paragon.6041.c.tooltip:99 "$paragon.6000.c.tooltip$"
		paragon.6041.d:99 "$paragon.6000.d$"
		paragon.6041.d.tooltip:99 "$paragon.6000.d.tooltip$"
		paragon.6041.e:99 "$paragon.6000.e$"
		paragon.6041.e.tooltip:99 "$paragon.6000.e.tooltip$"

	# LumEx - Convince Reformists Decision
		le_decision_convince_reformists:99 "Убедить реформистов"
		le_decision_convince_reformists_desc:99 "Светоч встречается с лидерами реформистов за закрытыми дверями, опираясь на десятилетия доверия и совместных жертв. Немногие могут сохранить свои убеждения перед тихим весом живой легенды."
		le_decision_convince_reformists_tt:99 "Один §Yэгалитарный§! поп на этой планете будет обращён в §Yавторитарную§! этику.\n§GЕсли после обращения на этой планете не останется эгалитарных попов§!, модификатор §YДемократические тенденции§! будет §Gудалён§!."

