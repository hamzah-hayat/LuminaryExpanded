l_russian:
	# Used for overwriting vanilla localisation keys
	paragon.5059.name:99 "Усердный лидер"
	paragon.5059.desc:99 "§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! упорно трудился, чтобы стать лучшим лидером. [Owner.Ruler.GetHisHerCap] обновлённая преданность делу уже была замечена советом."
	paragon.5059.a:99 "Армия должна играть центральную роль." #MILITARIST
	paragon.5059.b:99 "Вера нас поддержит." #SPIRITUALIST
	paragon.5059.c:99 "Закон и порядок прежде всего." #AUTHORITARIAN
	paragon.5059.d:99 "Наша держава открыта для всех." #XENOPHILE
	paragon.5059.e:99 "Мир принесёт нам богатство и процветание." #PACIFIST
	paragon.5059.f:99 "Прогресс приведёт нас к величию." #MATERIALIST
	paragon.5059.g:99 "Империя будет щитом против ксено-угрозы." #XENOPHOBE

	paragon.5060.name:99 "Порядок восстановлен"
	#paragon.5060.desc.imprisioned:2 "$paragon.beginning.speech$\n\nSociety is spiralling out of control. Rampant violence, insidious agitation, shameless lies... These things have plagued us for too long. With great pride, I announce an end to these troubled times! Those who sought to undermine us have been arrested, and I promise, they will face the full force of justice. Before long, they will repent for the harm they caused you!\n\n$paragon.ending.speech$"
	#paragon.5060.desc.negotiated:1 "$paragon.beginning.speech$\n\nIn times of conflict, it can be easy to lose sight of what we fight for, to view our political opponents as outright enemies. We have gone through trying times, but today I am proud to tell you that we have reached a peaceful outcome. Your voices have been heard. You had put your trust in me and I had failed you.\n\nNo more! With the upcoming constitutional reform, I firmly believe that we find ourselves back on the right path, and I am humbled by your trust in my ability to see these changes through. Upon my word, I shall not fail you again!\n\n$paragon.ending.speech$"
	#paragon.5060.desc.destroyed:1 "$paragon.beginning.speech$\n\nToday marks a great victory, but it has not been bought without sacrifice. Our enemies have been destroyed, yet the sting of their betrayal makes my heart bleed. In their selfishness they sought to destroy us all, but in the end, they were no match for our collective strength. Soon they will be executed for their crimes. We have prevailed!\n\n$paragon.ending.speech$"
	#paragon.5060.a:1 "We need a stronger leader!"
	#paragon.5060.a.tt:1 "§LRecent events have shown that only the wise rule of §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! can bring peace and prosperity to our society. We need to consolidate more power into the hands of our leader.§!"
	paragon.5060.a:99 "Армия должна играть центральную роль." #MILITARIST
	paragon.5060.b:99 "Вера нас поддержит." #SPIRITUALIST
	paragon.5060.c:99 "Закон и порядок прежде всего." #AUTHORITARIAN
	paragon.5060.d:99 "Наша держава открыта для всех." #XENOPHILE
	paragon.5060.e:99 "Мир принесёт нам богатство и процветание." #PACIFIST
	paragon.5060.f:99 "Прогресс приведёт нас к величию." #MATERIALIST
	paragon.5060.g:99 "Империя будет щитом против ксено-угрозы." #XENOPHOBE
	paragon.5060.h:99 "Нам нужно эффективное правительство!"
	paragon.5060.h.tt:99 "§LНедавние события показали, что для преодоления подобных дилемм в будущем нужна сильная правительственная власть. Мы должны передать совету больше полномочий.\n§!$paragon.leader.growth.negative$"


	# paragon.5061.name:1 "Tragedy Strikes"
	paragon.5061.desc:99 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! умирает. Природа болезни ещё не определена, но предварительные отчёты предполагают, что она неизлечима. §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! тяжело переживает грядущую утрату [Ruler.GetHisHer] потомка. Объявлен период национального траура, и мы ждём полных результатов медицинского расследования болезни наследника.\n\nНесмотря на крайнюю тяжесть болезни, §Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! достойно продолжает исполнять свои обязанности, но его состояние ухудшается с каждым днём. Светоч приказал врачам и учёным по всей империи сосредоточиться на поиске лекарства, даже в ущерб нашим гражданам."

	#paragon.5062.name:1 "Blinding Grief"
	paragon.5062.desc:99 "Прогноз для §Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! мрачен. Несмотря на все доказательства того, что болезнь имеет естественную природу, §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! отказывается это принять. [Ruler.GetHeShe] вместо этого считает, что это покушение, и приказы разосланы по всем нашим территориям. Виновные в этой подлости должны быть найдены. Силы безопасности уже проводят зачистки, чтобы выявить инакомыслящих.\n\nУровень насилия, сопровождающий эти аресты, шокировал многих наших граждан. Хотя они сочувствуют положению наследника, снова вспыхнули протесты, осуждающие злоупотребления властью и требующие новой волны правительственных реформ. Впервые в нашей истории большинство населения планеты восстало против правления [Ruler.GetTitle]."
