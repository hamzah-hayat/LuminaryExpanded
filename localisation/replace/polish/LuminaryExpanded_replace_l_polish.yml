l_polish:
	# Used for overwriting vanilla localisation keys
	paragon.5059.name:99 "Pilny przywódca"
	paragon.5059.desc:99 "§Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! ciężko pracował, by stać się lepszym przywódcą. [Owner.Ruler.GetHisHerCap] odnowione zaangażowanie zostało już zauważone przez radę."
	paragon.5059.a:99 "Wojsko musi odgrywać kluczową rolę." #MILITARIST
	paragon.5059.b:99 "Wiara nas podtrzyma." #SPIRITUALIST
	paragon.5059.c:99 "Prawo i porządek są najważniejsze." #AUTHORITARIAN
	paragon.5059.d:99 "Nasze państwo jest otwarte dla wszystkich." #XENOPHILE
	paragon.5059.e:99 "Pokój przyniesie nam bogactwo i pomyślność." #PACIFIST
	paragon.5059.f:99 "Postęp zaprowadzi nas do wielkości." #MATERIALIST
	paragon.5059.g:99 "Imperium będzie tarczą przeciw zagrożeniu ksenosów." #XENOPHOBE

	paragon.5060.name:99 "Porządek przywrócony"
	#paragon.5060.desc.imprisioned:2 "$paragon.beginning.speech$\n\nSociety is spiralling out of control. Rampant violence, insidious agitation, shameless lies... These things have plagued us for too long. With great pride, I announce an end to these troubled times! Those who sought to undermine us have been arrested, and I promise, they will face the full force of justice. Before long, they will repent for the harm they caused you!\n\n$paragon.ending.speech$"
	#paragon.5060.desc.negotiated:1 "$paragon.beginning.speech$\n\nIn times of conflict, it can be easy to lose sight of what we fight for, to view our political opponents as outright enemies. We have gone through trying times, but today I am proud to tell you that we have reached a peaceful outcome. Your voices have been heard. You had put your trust in me and I had failed you.\n\nNo more! With the upcoming constitutional reform, I firmly believe that we find ourselves back on the right path, and I am humbled by your trust in my ability to see these changes through. Upon my word, I shall not fail you again!\n\n$paragon.ending.speech$"
	#paragon.5060.desc.destroyed:1 "$paragon.beginning.speech$\n\nToday marks a great victory, but it has not been bought without sacrifice. Our enemies have been destroyed, yet the sting of their betrayal makes my heart bleed. In their selfishness they sought to destroy us all, but in the end, they were no match for our collective strength. Soon they will be executed for their crimes. We have prevailed!\n\n$paragon.ending.speech$"
	#paragon.5060.a:1 "We need a stronger leader!"
	#paragon.5060.a.tt:1 "§LRecent events have shown that only the wise rule of §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! can bring peace and prosperity to our society. We need to consolidate more power into the hands of our leader.§!"
	paragon.5060.a:99 "Wojsko musi odgrywać kluczową rolę." #MILITARIST
	paragon.5060.b:99 "Wiara nas podtrzyma." #SPIRITUALIST
	paragon.5060.c:99 "Prawo i porządek są najważniejsze." #AUTHORITARIAN
	paragon.5060.d:99 "Nasze państwo jest otwarte dla wszystkich." #XENOPHILE
	paragon.5060.e:99 "Pokój przyniesie nam bogactwo i pomyślność." #PACIFIST
	paragon.5060.f:99 "Postęp zaprowadzi nas do wielkości." #MATERIALIST
	paragon.5060.g:99 "Imperium będzie tarczą przeciw zagrożeniu ksenosów." #XENOPHOBE
	paragon.5060.h:99 "Potrzebujemy sprawnego rządu!"
	paragon.5060.h.tt:99 "§LNiedawne wydarzenia pokazały, że potrzebne są mocne rządy, by w przyszłości pokonać podobne dylematy. Musimy przekazać więcej władzy radzie.\n§!$paragon.leader.growth.negative$"


	# paragon.5061.name:1 "Tragedy Strikes"
	paragon.5061.desc:99 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! umiera. Nie ustaliliśmy jeszcze charakteru choroby, ale wstępne raporty sugerują, że jest śmiertelna. §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! ciężko zniósł nadciągającą stratę swojego potomka. Ogłoszono okres żałoby narodowej i czekamy na pełne wyniki śledztwa medycznego dotyczącego choroby następcy.\n\nMimo skrajnej choroby §Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! godnie kontynuuje swoje obowiązki, lecz jego stan pogarsza się z dnia na dzień. Luminarz nakazał lekarzom i naukowcom w całym imperium skupić się na znalezieniu lekarstwa, nawet kosztem naszych obywateli."

	#paragon.5062.name:1 "Blinding Grief"
	paragon.5062.desc:99 "Rokowanie dla §Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! jest ponure. Mimo wszystkich dowodów wskazujących na naturalny charakter choroby, §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! odmawia ich przyjęcia. [Ruler.GetHeShe] zamiast tego sądzi, że to próba zamachu, i rozesłał rozkazy po naszych terytoriach. Sprawcy tego tchórzostwa muszą zostać znalezieni. Siły bezpieczeństwa już prowadzą obławy w celu wykorzenienia opozycjonistów.\n\nPoziom przemocy towarzyszący tym aresztowaniom wstrząsnął wieloma z naszych obywateli. Choć współczują losowi następcy, ponownie wybuchły protesty potępiające nadużycia władzy i domagające się nowej fali reform rządowych. Po raz pierwszy w naszej historii większość ludności pewnej planety powstała przeciwko rządom [Ruler.GetTitle]."
