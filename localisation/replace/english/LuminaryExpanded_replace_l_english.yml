l_english:
	# Used for overwriting vanilla localisation keys
	# paragon.5061.name:1 "Tragedy Strikes"
	paragon.5061.desc:1 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! is dying. We have yet to determine the nature of the disease, but preliminary reports suggest that it is terminal. §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! has been struck hard by the impending loss of [Ruler.GetHisHer] progeny. A period of national mourning has been decreed and we await the full results of the medical investigation into the heir's disease.\n\nWhile extremely sick, §Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! admirably continues to perform their duties, but their condition is worsening by the day. The Luminary has ordered doctors and scientists across the empire to focus on finding a cure, even at the expense of our citizens."

	#paragon.5062.name:1 "Blinding Grief"
	paragon.5062.desc:1 "The prognosis for §Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! is grim. Despite every evidence pointing at the disease being natural, §Y[Ruler.GetTitle] [Ruler.GetRegnalName]§! refuses to accept it. [Ruler.GetHeShe] believes it instead to be an attempted assassination, and orders have been sent across our territories. Those responsible for this cowardice must be found. Security forces are already conducting sweeps to root out dissenters.\n\nThe level of violence that has accompanied these arrests has shocked many of our citizens. Though sympathetic to the plight of the heir, protests denouncing the abuses of power and demanding a new wave of government reforms have erupted once again. For the first time in our history, the majority of a planet's population has risen up against the rule of the [Ruler.GetTitle]."