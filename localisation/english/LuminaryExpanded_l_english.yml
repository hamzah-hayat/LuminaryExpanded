	# LumEx - Choose Luminary Ethic Trait
		paragon.5001.name:0 "Guiding Principles"
		paragon.5001.desc:0 "As §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! takes the reins of power, a defining question emerges: what guiding ethic will shape [Owner.Ruler.GetHisHer] legendary rule?\n\nThe council awaits the Luminary's declaration, knowing that this choice will echo throughout the empire for generations to come."
