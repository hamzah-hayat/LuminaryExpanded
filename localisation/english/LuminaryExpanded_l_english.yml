	# LumEx - Choose Heir Ethic
		paragon.5002.name:0 "Shaping the Heir"
		paragon.5002.desc:0 "A new heir has been designated to carry on the legacy of §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!. Before §Y[Owner.GetHeirName]§! begins their training, a crucial decision must be made: what guiding ethic will shape their worldview and future leadership?\n\nThe Luminary must choose wisely, for this choice will define the heir's character for years to come."
		paragon.5002.militarist:0 "$paragon.5001.militarist$"
		paragon.5002.pacifist:0 "$paragon.5001.pacifist$"
		paragon.5002.authoritarian:0 "$paragon.5001.authoritarian$"
		paragon.5002.spiritualist:0 "$paragon.5001.spiritualist$"
		paragon.5002.materialist:0 "$paragon.5001.materialist$"
		paragon.5002.xenophobe:0 "$paragon.5001.xenophobe$"
		paragon.5002.xenophile:0 "$paragon.5001.xenophile$"

	# LumEx - Choose Heir Leader Class
		paragon.5003.name:0 "The Heir's Path"
		paragon.5003.desc:0 "With §Y[Owner.GetHeirName]'s§! guiding principles now established, the time has come to determine the path of their training. Shall they be forged into a military commander, shaped into a brilliant scientist, or groomed as a skilled official?\n\nThe Luminary's choice will determine the heir's expertise and role within the empire."
		paragon.5003.commander:0 "Train as a Commander"
		paragon.5003.scientist:0 "Train as a Scientist"
		paragon.5003.official:0 "Train as an Official"

	# 40 Year Plan Insight events
		paragon.5324.name:0 "The 40 Year Plan"
		paragon.5324.desc:0 "The groundwork for the 40 year plan has now been established!\nTogether, our people are ready to embark on this ambitious journey to the stars.\nThere are still many challenges to overcome, but with a recent great discovery I know we will achieve greatness!"

		paragon.5324.starbase:0 "Upgrade Starbase"
		paragon.5324.living_metal:0 "Discover Living Metal"
		paragon.5324.dark_matter:0 "Find Dark Matter"
		paragon.5324.strategic_resources:0 "Prospect Strategic Resources"
	
	# Milestone Events
		paragon.5031.name:0 "A Monument to Progress"
		paragon.5031.desc:0 "$paragon.beginning.speech$\n\nToday marks a defining moment in the history of our great empire. The completion of this megastructure stands as a testament to the ingenuity and resolve of our people. Under my visionary leadership, we have achieved what many believed impossible, bending the very fabric of the cosmos to our will.\n\n$paragon.ending.speech$"
		paragon.5031.a:0 "A triumph of engineering!"

		paragon.5401.name:0 "The Beast is Slain"
		paragon.5401.desc:0 "$paragon.beginning.speech$\n\nA great and terrible creature, a colossus of the void, has fallen before the might of our fleets. Where others trembled, we stood firm, and under my guidance, our forces struck down the leviathan. Let the galaxy know that no beast, however ancient or fearsome, is beyond the reach of our empire.\n\n$paragon.ending.speech$"
		paragon.5401.a:0 "None can stand against us!"

		paragon.5403.name:0 "A Homeworld Claimed"
		paragon.5403.desc:0 "$paragon.beginning.speech$\n\nThe birthworld of a rival civilization now flies our banner. This is no mere conquest of territory, it is the uprooting of a people's most sacred ground. Under my decisive leadership, our armies have secured the very cradle of another species, forever altering the balance of power in the galaxy.\n\n$paragon.ending.speech$"
		paragon.5403.a:0 "Their legacy is now ours!"

		paragon.5405.name:0 "The Pillars of Culture"
		paragon.5405.desc:0 "$paragon.beginning.speech$\n\nOur traditions have guided us for generations, and now they are fully realized. Our society has reached a breadth of cultural achievement rarely seen among the stars. Under my stewardship, our people have explored every avenue of thought, philosophy, and practice available to them. We stand as a fully complete civilization.\n\n$paragon.ending.speech$"
		paragon.5405.a:0 "Our culture is unmatched!"

		paragon.5407.name:0 "Echoes of the Ancients"
		paragon.5407.desc:0 "$paragon.beginning.speech$\n\nWe have uncovered the final remnants of a civilization that came before us, a precursor whose achievements once shaped the very galaxy. Their secrets are now ours to study and preserve. Under my vision, we have completed the greatest archaeological endeavour in the history of our people, connecting our future to a lost and ancient past.\n\n$paragon.ending.speech$"
		paragon.5407.a:0 "We carry their torch forward!"

		paragon.5409.name:0 "The Crisis Averted"
		paragon.5409.desc:0 "$paragon.beginning.speech$\n\nThe galaxy teetered on the brink of annihilation, and yet we endured. The crisis that threatened to consume all of civilization has been defeated. Under my unyielding resolve, our empire stood as a bulwark against the darkness. This victory belongs not only to us, but to every species that still draws breath in this galaxy.\n\n$paragon.ending.speech$"
		paragon.5409.a:0 "The galaxy is saved!"

	# Forgotten Events
		paragon.forgotten.a.2:0 "Release some \"dissenters\""
		paragon.forgotten.a.3:0 "Suppress the media."

		paragon.forgotten.b.2:0 "Placate with bribes."
		paragon.forgotten.b.3:0 "Ignore the deceit."

		paragon.forgotten.c.2:0 "Fabricate counter-evidence."
		paragon.forgotten.c.3:0 "Apologise publicly."

	# Heir Illness Situation
		paragon_origin_heir_illness:0 "Dying Heir"
		paragon_origin_heir_illness_type:0 "$paragon_origin_heir_illness$"
		paragon_origin_heir_illness_desc:0 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! is afflicted with a terminal illness! We must find a cure quickly, but the condition worsens by the day, doctors and scientists across the empire are working tirelessly to find a permanent cure."
		paragon_origin_heir_illness_monthly_change_tooltip:0 "The heir's disease continues to worsen, only with the best medical care and biological research can we hope to cure it in time."
		situation_paragon_origin_heir_illness_palliative:0 "Palliative Care"
		approach_situation_paragon_origin_heir_illness_palliative_tt:0 "We will do our best to make [Owner.GetHeirName] comfortable in their final days, but we must accept that there is no hope for a cure."
		situation_paragon_origin_heir_illness_medical:0 "Medical Treatment"
		approach_situation_paragon_origin_heir_illness_medical_tt:0 "We shall spare no expense in treating [Owner.GetHeirName]'s illness. With doctors across the empire working tirelessly, we hope to find a cure."
		situation_paragon_origin_heir_illness_radical:0 "Radical Intervention"
		approach_situation_paragon_origin_heir_illness_radical_tt:0 "Every single doctor and biologist in the empire will be mobilized to save [Owner.GetHeirName]. All other priorities will be set aside in order to save the Luminary's heir!"

		situation_heir_illness_dying:0 "[Owner.GetHeirName]'s condition is worsening, and it seems unlikely that they will survive for much longer."
		situation_heir_illness_steady:0 "[Owner.GetHeirName]'s condition has stabilized, but a permanent cure is still out of reach."
		situation_heir_illness_recovering:0 "[Owner.GetHeirName]'s condition is improving, and there is hope that they will make a full recovery."

		paragon_origin_heir_illness_getting_worse:0 "Illness Severity"
		paragon_origin_heir_illness_medical_approach:0 "Medical Treatment"
		paragon_origin_heir_illness_radical_approach:0 "Radical Intervention"

		paragon_origin_heir_illness_doctor_number:0 "Doctors in Empire"
		paragon_origin_heir_illness_biologist_number:0 "Biologists in Empire"

		paragon_origin_heir_illness_complete:0 "§G[Owner.GetHeirName] makes a miraculous recovery§!."
		paragon_origin_heir_illness_fail:0 "§R[Owner.GetHeirName] succumbs to their illness§!."

		paragon.heir.sickness.positive:0 "§Y[owner.GetHeirTitle] [owner.GetHeirName]'s§! §YSickness§! §Gimproves§!."
		paragon.heir.sickness.negative:0 "§Y[owner.GetHeirTitle] [owner.GetHeirName]'s§! §YSickness§! §Rworsens§!."

		# Events
		# Heir illness outcome events
		paragon.5080.name:0 "Miraculous Recovery"
		paragon.5080.desc:0 "§H§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! has appeared on every screen across the empire. Our population is waiting for the address to begin.§!\n\nCitizens of our great empire, I stand before you today alive, whole, and filled with a gratitude that words can scarcely express. Not long ago, I lay at death's door, my body failing, my future uncertain. But I am here now because of the extraordinary people who refused to let me die.\n\nThe doctors who worked through sleepless nights, the biologists who pushed the boundaries of science itself, they are the true heroes of this empire.\n\nI owe them everything, and so does this empire. Let their names be remembered, for it is their brilliance and devotion that keeps the empire going!\n\n$paragon.ending.speech$"
		paragon.5080.a:0 "Long live the [Owner.GetHeirTitle]!"

		paragon.5081.name:0 "Tragic Loss"
		paragon.5081.desc:0 "$paragon.beginning.speech$\n\nToday I address you not only as your Luminary, but as a parent broken by grief. My child, §Y[Owner.GetHeirName]§!, the future of this great empire, has been taken from us. Let there be no mistake, this was no act of fate. It was the Reformists, Those wretched agitators who sowed division and undermined our efforts at every turn, who bear the weight of this tragedy.\n\nTheir obstruction delayed critical research, their sabotage bled resources meant for the cure, and now my progeny lies cold because of their treachery. I swear before every citizen of this empire: their reckoning will come. We will endure this loss, but we will never forget who is responsible.\n\n$paragon.ending.speech$"
		paragon.5081.a:0 "The traitors will pay for this!"

		# Heir illness progression events
		paragon.5082.name:0 "Grave Setback"
		paragon.5082.desc:0 "The medical teams attending §Y[owner.GetHeirTitle] [owner.GetHeirName]§! have delivered grim news. Overnight, the heir's vital signs deteriorated sharply, and a new wave of symptoms has emerged that the doctors had not anticipated.\n\nThe carefully constructed treatment regimen that had been holding the disease at bay appears to be failing, and the physicians are scrambling to adjust their approach before the window of opportunity closes entirely.\nAcross the empire, word has already begun to spread. Vigils have formed outside government buildings, and the mood in the capital has grown sombre.\n\nOfficials are quietly discussing contingencies that no one dares speak of openly."
		paragon.5082.a:0 "We must endure."

		paragon.5083.name:0 "Complications"
		paragon.5083.desc:0 "A cascade of secondary complications has struck §Y[owner.GetHeirTitle] [owner.GetHeirName]§!, compounding the already dire prognosis. What began as a single affliction has now spread its tendrils through multiple organ systems, and the heir's body is struggling to fight on so many fronts at once. The lead physician has reported that several experimental treatments had to be abandoned after triggering adverse reactions, narrowing the remaining options considerably."
		paragon.5083.a:0 "Stay hopeful."

		paragon.5084.name:0 "Disease Breakthrough"
		paragon.5084.desc:0 "The research teams working around the clock to save §Y[owner.GetHeirTitle] [owner.GetHeirName]§! have made a critical discovery. A new compound, synthesised from biological samples gathered across the empire, has shown remarkable effectiveness against the disease in laboratory trials.\n\nEarly tests on the heir have yielded promising results, with key symptoms showing measurable retreat for the first time since the illness began.\n\nThe news has electrified the empire. Doctors are being hailed as heroes, and a wave of cautious optimism has swept through the population.\n\nFor the first time in months, there is genuine hope that a full cure may be within reach."
		paragon.5084.a:0 "A cure is within reach!"

		paragon.5085.name:0 "Healing Progress"
		paragon.5085.desc:0 "For the first time in what feels like an eternity, §Y[owner.GetHeirTitle] [owner.GetHeirName]'s§! physicians have delivered encouraging news. The heir's colour has returned, their appetite has improved, and they have regained some strength, something that would have been unthinkable just weeks ago.\nWhile the medical team cautions that the road to full recovery is still long and uncertain, the improvement is undeniable.\n\nCitizens have taken to the streets in quiet celebration, and messages of support continue to pour in from every corner of the empire."
		paragon.5085.a:0 "Wonderful news!"

		# Heir working events
		paragon.5086.name:0 "Public Speech"
		paragon.5086.desc:0 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! is scheduled to deliver a major public address before the citizens of the capital. Despite the visible toll of their illness, the heir has made it abundantly clear that they intend to take the stage in person. Their physicians have warned that the physical strain of such an appearance could worsen their condition significantly, but the heir insists that the people need to see strength from their future leader.\nThe council has raised the matter with us directly. What should we do?"
		paragon.5086.a:0 "Allow the Speech to go on as planned."
		paragon.5086.b:0 "Pre-record the speech."
		paragon.5086.c:0 "Cancel the Speech."

		paragon.5087.name:0 "Council Work"
		paragon.5087.desc:0 "Day after day, §Y[owner.GetHeirTitle] [owner.GetHeirName]§! continues to push themselves relentlessly, attending every council meeting, reviewing legislation, and weighing in on matters of state as though nothing were wrong. The council members have noticed the dark circles under their eyes, the pale and gaunt appearance, the moments where they pause mid-sentence to steady themselves.\nSeveral advisors have privately expressed their alarm, warning that this punishing schedule is accelerating the heir's decline. Yet the heir refuses to step back, insisting that their duty to the empire comes before their own well-being. The council has formally brought the matter to our attention. What should we do?"
		paragon.5087.a:0 "Keep the duty schedule as it is."
		paragon.5087.b:0 "Reduce the heir's workload."
		paragon.5087.c:0 "Excuse the heir from council work."

		paragon.5088.name:0 "Colony Visit"
		paragon.5088.desc:0 "A diplomatic visit to [reformist_colony.GetName] has long been on §Y[owner.GetHeirTitle] [owner.GetHeirName]'s§! schedule. The colony has become a hotbed of reformist sentiment, and the heir's personal presence was intended to calm tensions and persuade the local leaders to cooperate with the central government.\nHowever, the journey itself is gruelling, the stress of negotiations would be immense, and the heir's physicians have cautioned that travel in their current state carries serious risk. On the other hand, cancelling could embolden the reformists further. What should we do?"
		paragon.5088.a:0 "Proceed with the visit as planned."
		paragon.5088.b:0 "Postpone the visit."
		paragon.5088.c:0 "Cancel the visit."

		paragon.5089.name:0 "Navy Inspection"
		paragon.5089.desc:0 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! is scheduled to conduct a formal inspection of the imperial fleet. The visit was arranged months ago, a show of leadership and solidarity with our naval forces that would see the heir touring the flagship, addressing the officers, and reviewing combat readiness reports in person.\nThe admiralty has been preparing for the heir's arrival, but the heir's medical team has raised serious objections. The physical demands of moving through a warship, combined with the fatigue of the ceremonies, could push their fragile health past its limits. What should we do?"
		paragon.5089.a:0 "Proceed with the inspection as planned."
		paragon.5089.b:0 "Postpone the inspection."
		paragon.5089.c:0 "Cancel the inspection."

		# Luminary Speech events
		# Event which triggers once Luminary maxes trait out
		paragon.5040.name:0 "The Legendary Luminary"
		paragon.5040.desc:0 "$paragon.beginning.speech$\n\nIn the message that follows, [Root.Owner.Ruler.GetName] reflects on a journey shaped by trials, growth, and revelation, speaking at length on the wisdom gained and the strength forged through adversity. They recount the lessons learned about themselves, their people, and the vast universe they inhabit, weaving these insights into a renewed sense of purpose. The address crescendos into a declaration of intent, a commitment to forever guide the empire toward a radiant and prosperous future.\n\n$paragon.ending.speech$"
		paragon.5040.a:0 "The Luminary will guide us!"
		paragon.leader.growth.positive.max:0 "§Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]'s§! §YLuminary§! Trait §Ghas reached its maximum§!.\n§YThe Luminary trait (and Luminary ascension traits) gain bonus effects and will never reduce.§!"

	# LumEx - Post-Fall Ascension Upgrade
		paragon.6041.name:0 "Transcending the Apparatus"
		paragon.6041.desc:0 "$paragon.beginning.speech$\n\nFor years, the Sustaining Apparatus has kept me alive, a marvel of engineering that has bound my consciousness to this mortal frame. But our people have achieved something far greater. Through our ascension, a new path has opened, one that could free me from the confines of this machine and grant me a form worthy of the empire I have built.\n\nThe question before us now is simple: shall I remain tethered to the apparatus, or shall I embrace the future our people have unlocked?\n\n$paragon.ending.speech$"
		paragon.6041.a:0 "Keep the Apparatus."
		paragon.6041.a.tooltip:0 "My throne will suffice. §RWarning: This choice will not repeat§!"
		paragon.6041.b:0 "$paragon.6000.b$"
		paragon.6041.b.tooltip:0 "$paragon.6000.b.tooltip$"
		paragon.6041.c:0 "$paragon.6000.c$"
		paragon.6041.c.tooltip:0 "$paragon.6000.c.tooltip$"
		paragon.6041.d:0 "$paragon.6000.d$"
		paragon.6041.d.tooltip:0 "$paragon.6000.d.tooltip$"
		paragon.6041.e:0 "$paragon.6000.e$"
		paragon.6041.e.tooltip:0 "$paragon.6000.e.tooltip$"