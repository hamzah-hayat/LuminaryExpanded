		paragon.forgotten.b.3:99 "Zignorować oszustwo."

		paragon.forgotten.c.2:99 "Sfabrykować kontrdowody."
		paragon.forgotten.c.3:99 "Publicznie przeprosić."

	# Heir Illness Situation
		paragon_origin_heir_illness:99 "Umierający następca"
		paragon_origin_heir_illness_type:99 "$paragon_origin_heir_illness$"
		paragon_origin_heir_illness_desc:99 "§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! cierpi na śmiertelną chorobę! Musimy szybko znaleźć lekarstwo, lecz stan pogarsza się z dnia na dzień, lekarze i naukowcy w całym imperium pracują niestrudzenie nad znalezieniem ostatecznego ratunku."
		paragon_origin_heir_illness_monthly_change_tooltip:99 "Choroba następcy nadal się pogarsza, jedynie najlepsza opieka medyczna i badania biologiczne dają nadzieję na wyleczenie jej w porę."
		situation_paragon_origin_heir_illness_palliative:99 "Opieka paliatywna"
		approach_situation_paragon_origin_heir_illness_palliative_tt:99 "Dołożymy starań, by [Owner.GetHeirName] mógł spędzić ostatnie dni w spokoju, lecz musimy przyjąć, że nie ma nadziei na wyleczenie."
		situation_paragon_origin_heir_illness_medical:99 "Leczenie medyczne"
		approach_situation_paragon_origin_heir_illness_medical_tt:99 "Nie szczędzić środków na leczenie choroby [Owner.GetHeirName]. Dzięki niestrudzonej pracy lekarzy w całym imperium liczymy na znalezienie lekarstwa."
		situation_paragon_origin_heir_illness_radical:99 "Radykalna interwencja"
		approach_situation_paragon_origin_heir_illness_radical_tt:99 "Każdy lekarz i biolog w imperium zostanie zmobilizowany, by ocalić [Owner.GetHeirName]. Wszystkie inne priorytety zostaną odłożone, by uratować następcę Luminarza!"

		situation_heir_illness_dying:99 "Stan [Owner.GetHeirName] pogarsza się i wydaje się mało prawdopodobne, by przetrwał dłużej."
		situation_heir_illness_steady:99 "Stan [Owner.GetHeirName] ustabilizował się, ale ostateczne wyleczenie wciąż pozostaje poza zasięgiem."
		situation_heir_illness_recovering:99 "Stan [Owner.GetHeirName] poprawia się i jest nadzieja na pełny powrót do zdrowia."

		paragon_origin_heir_illness_getting_worse:99 "Nasilenie choroby"
		paragon_origin_heir_illness_medical_approach:99 "Leczenie medyczne"
		paragon_origin_heir_illness_radical_approach:99 "Radykalna interwencja"

		paragon_origin_heir_illness_doctor_number:99 "Lekarze w imperium"
		paragon_origin_heir_illness_biologist_number:99 "Biolodzy w imperium"

		paragon_origin_heir_illness_complete:99 "§G[Owner.GetHeirName] dokonuje cudownego powrotu do zdrowia§!."
		paragon_origin_heir_illness_fail:99 "§R[Owner.GetHeirName] umiera z powodu swojej choroby§!."

		paragon.heir.sickness.positive:99 "§YChoroba§! §Y[owner.GetHeirTitle] [owner.GetHeirName]§! §Gulega poprawie§!."
		paragon.heir.sickness.negative:99 "§YChoroba§! §Y[owner.GetHeirTitle] [owner.GetHeirName]§! §Rsię pogarsza§!."

		# Events
		# Heir illness outcome events
		paragon.5080.name:99 "Cudowny powrót do zdrowia"
		paragon.5080.desc:99 "§H§Y[Owner.GetHeirTitle] [Owner.GetHeirName]§! pojawił się na każdym ekranie w imperium. Nasi obywatele czekają na rozpoczęcie przemówienia.§!\n\nObywatele naszego wielkiego imperium, staję dziś przed wami żywy, cały i przepełniony wdzięcznością, której słowa ledwie potrafią wyrazić. Niedawno leżałem u bram śmierci, moje ciało odmawiało posłuszeństwa, moja przyszłość była niepewna. Jestem tu dzięki niezwykłym ludziom, którzy nie pozwolili mi umrzeć.\n\nLekarze, którzy pracowali bezsenne noce, biolodzy, którzy przesuwali same granice nauki, oni są prawdziwymi bohaterami tego imperium.\n\nWszystko im zawdzięczam, podobnie jak to imperium. Niech ich imiona zostaną zapamiętane, gdyż to ich geniusz i poświęcenie utrzymują imperium w działaniu!\n\n$paragon.ending.speech$"
		paragon.5080.a:99 "Niech żyje [Owner.GetHeirTitle]!"

		paragon.5081.name:99 "Tragiczna strata"
		paragon.5081.desc:99 "$paragon.beginning.speech$\n\nDzisiaj zwracam się do was nie tylko jako wasz Luminarz, ale jako rodzic złamany żałobą. Moje dziecko, §Y[Owner.GetHeirName]§!, przyszłość tego wielkiego imperium, zostało nam odebrane. Niech nie będzie żadnych wątpliwości, to nie był wyrok losu. To Reformiści, ci nikczemni podżegacze, którzy siali podziały i podkopywali nasze wysiłki na każdym kroku, są winni tej tragedii.\n\nIch obstrukcja opóźniła kluczowe badania, ich sabotaż wyciekł zasoby przeznaczone na lekarstwo, a teraz moje potomstwo leży zimne z powodu ich zdrady. Przysięgam przed każdym obywatelem tego imperium: rozliczenie ich nadejdzie. Wytrzymamy tę stratę, ale nigdy nie zapomnimy, kto jest za nią odpowiedzialny.\n\n$paragon.ending.speech$"
		paragon.5081.a:99 "Zdrajcy za to zapłacą!"

		# Heir illness progression events
		paragon.5082.name:99 "Poważne pogorszenie"
		paragon.5082.desc:99 "Zespoły medyczne opiekujące się §Y[owner.GetHeirTitle] [owner.GetHeirName]§! przekazały ponure wieści. W ciągu nocy parametry życiowe następcy gwałtownie się pogorszyły, a pojawiła się nowa fala objawów, której lekarze nie przewidzieli.\n\nStarannie opracowany schemat leczenia, który dotąd trzymał chorobę w ryzach, wydaje się zawodzić, a lekarze gorączkowo modyfikują podejście, zanim okno możliwości całkowicie się zamknie.\nW całym imperium wieść już zaczęła się rozchodzić. Przed budynkami rządowymi zawiązują się czuwania, a nastrój w stolicy stał się ponury.\n\nUrzędnicy po cichu omawiają scenariusze, których nikt nie ośmiela się wypowiedzieć na głos."
		paragon.5082.a:99 "Musimy wytrwać."

		paragon.5083.name:99 "Powikłania"
		paragon.5083.desc:99 "Kaskada wtórnych powikłań spadła na §Y[owner.GetHeirTitle] [owner.GetHeirName]§!, pogłębiając i tak już ciężkie rokowania. To, co zaczęło się jako jedna dolegliwość, rozprzestrzeniło teraz swoje macki na wiele układów organizmu, a ciało następcy walczy na zbyt wielu frontach naraz. Naczelny lekarz zgłosił, że kilka eksperymentalnych metod leczenia trzeba było porzucić po wywołaniu reakcji niepożądanych, znacznie zawężając pozostałe opcje."
		paragon.5083.a:99 "Zachowajmy nadzieję."

		paragon.5084.name:99 "Przełom w chorobie"
		paragon.5084.desc:99 "Zespoły badawcze pracujące całą dobę nad ratowaniem §Y[owner.GetHeirTitle] [owner.GetHeirName]§! dokonały kluczowego odkrycia. Nowy związek, zsyntetyzowany z próbek biologicznych zebranych w całym imperium, wykazał niezwykłą skuteczność przeciw chorobie w testach laboratoryjnych.\n\nWczesne badania na następcy dały obiecujące wyniki, a kluczowe objawy wymiernie cofnęły się po raz pierwszy od początku choroby.\n\nWieść zelektryzowała imperium. Lekarze są okrzykiwani bohaterami, a fala ostrożnego optymizmu ogarnęła ludność.\n\nPo raz pierwszy od miesięcy istnieje prawdziwa nadzieja, że pełne wyleczenie jest w zasięgu."
		paragon.5084.a:99 "Lekarstwo jest w zasięgu!"

		paragon.5085.name:99 "Postęp w zdrowieniu"
		paragon.5085.desc:99 "Po raz pierwszy od czasu, który wydaje się wiecznością, lekarze §Y[owner.GetHeirTitle] [owner.GetHeirName]§! przekazali budujące wieści. Rumieńce następcy wróciły, apetyt poprawił się, a on sam odzyskał nieco sił, co kilka tygodni temu byłoby nie do pomyślenia.\nChoć zespół medyczny przestrzega, że droga do pełnego powrotu do zdrowia jest jeszcze długa i niepewna, poprawa jest niezaprzeczalna.\n\nObywatele wyszli na ulice w cichym świętowaniu, a wiadomości z wyrazami wsparcia nadal napływają z każdego zakątka imperium."
		paragon.5085.a:99 "Wspaniałe wieści!"

		# Heir working events
		paragon.5086.name:99 "Publiczne przemówienie"
		paragon.5086.desc:99 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! ma wygłosić ważne publiczne przemówienie do mieszkańców stolicy. Mimo widocznych skutków choroby, następca jasno dał do zrozumienia, że zamierza osobiście wystąpić na scenie. Jego lekarze ostrzegli, że obciążenie fizyczne takiego wystąpienia może znacznie pogorszyć jego stan, ale następca nalega, że lud musi zobaczyć siłę swojego przyszłego przywódcy.\nRada zwróciła się do nas wprost w tej sprawie. Co zrobić?"
		paragon.5086.a:99 "Pozwolić, by przemówienie odbyło się zgodnie z planem."
		paragon.5086.b:99 "Nagrać przemówienie wcześniej."
		paragon.5086.c:99 "Odwołać przemówienie."

		paragon.5087.name:99 "Praca w radzie"
		paragon.5087.desc:99 "Dzień po dniu §Y[owner.GetHeirTitle] [owner.GetHeirName]§! nadal niestrudzenie się eksploatuje, uczęszczając na każde posiedzenie rady, przeglądając ustawy i wypowiadając się w sprawach państwowych, jakby nic się nie działo. Członkowie rady zauważyli ciemne kręgi pod oczami, bladą i wynędzniałą twarz, chwile, gdy zatrzymuje się w połowie zdania, by się zebrać.\nKilku doradców prywatnie wyraziło zaniepokojenie, ostrzegając, że ten katorżniczy harmonogram przyspiesza upadek następcy. Mimo to następca odmawia odsunięcia się, podkreślając, że jego obowiązek wobec imperium wyprzedza własne dobro. Rada formalnie przedstawiła nam tę sprawę. Co zrobić?"
		paragon.5087.a:99 "Pozostawić harmonogram obowiązków bez zmian."
		paragon.5087.b:99 "Zmniejszyć obciążenie pracą następcy."
		paragon.5087.c:99 "Zwolnić następcę z prac rady."

		paragon.5088.name:99 "Wizyta w kolonii"
		paragon.5088.desc:99 "Wizyta dyplomatyczna w [reformist_colony.GetName] od dawna figuruje w harmonogramie §Y[owner.GetHeirTitle] [owner.GetHeirName]§!. Kolonia stała się gniazdem nastrojów reformistycznych, a osobista obecność następcy miała załagodzić napięcia i przekonać miejscowych przywódców do współpracy z rządem centralnym.\nJednak sama podróż jest wyczerpująca, stres negocjacji byłby ogromny, a lekarze następcy ostrzegli, że podróżowanie w obecnym stanie niesie poważne ryzyko. Z drugiej strony odwołanie wizyty mogłoby ośmielić reformistów. Co zrobić?"
		paragon.5088.a:99 "Przeprowadzić wizytę zgodnie z planem."
		paragon.5088.b:99 "Odłożyć wizytę."
		paragon.5088.c:99 "Odwołać wizytę."

		paragon.5089.name:99 "Inspekcja floty"
		paragon.5089.desc:99 "§Y[owner.GetHeirTitle] [owner.GetHeirName]§! ma przeprowadzić oficjalną inspekcję cesarskiej floty. Wizytę zaplanowano miesiące temu, jako pokaz przywództwa i solidarności z naszymi siłami marynarki, podczas której następca obejdzie okręt flagowy, przemówi do oficerów i osobiście przejrzy raporty gotowości bojowej.\nAdmiralicja przygotowywała się do przybycia następcy, lecz jego zespół medyczny zgłosił poważne sprzeciwy. Wymogi fizyczne poruszania się po okręcie wojennym, w połączeniu ze zmęczeniem ceremoniami, mogą wypchnąć jego kruche zdrowie poza granice. Co zrobić?"
		paragon.5089.a:99 "Przeprowadzić inspekcję zgodnie z planem."
		paragon.5089.b:99 "Odłożyć inspekcję."
		paragon.5089.c:99 "Odwołać inspekcję."

		# Luminary Speech events
		# Event which triggers once Luminary maxes trait out
		paragon.5040.name:99 "Legendarny Luminarz"
		paragon.5040.desc:99 "$paragon.beginning.speech$\n\nW poniższej wiadomości [Root.Owner.Ruler.GetName] zastanawia się nad podróżą ukształtowaną przez próby, wzrost i objawienia, mówiąc obszernie o nabytej mądrości i sile wykutej w przeciwnościach. Opowiada o lekcjach o sobie, swoim ludzie i rozległym wszechświecie, w którym żyje, splatając te przemyślenia w odnowione poczucie celu. Przemówienie krescenduje w deklaracji intencji, w obietnicy wiecznego prowadzenia imperium ku promiennej i pomyślnej przyszłości.\n\n$paragon.ending.speech$"
		paragon.5040.a:99 "Luminarz nas poprowadzi!"
		paragon.leader.growth.positive.max:99 "Cecha §YLuminarza§! §Y[owner.Ruler.GetTitle] [owner.Ruler.GetRegnalName]§! §Gosiągnęła swoje maksimum§!.\n§YCecha Luminarza (oraz cechy wstąpienia Luminarza) zyskują dodatkowe efekty i nigdy się nie zmniejszą.§!"

	# LumEx - Post-Fall Ascension Upgrade
		paragon.6041.name:99 "Przekroczenie Aparatu"
		paragon.6041.desc:99 "$paragon.beginning.speech$\n\nPrzez lata Aparat Podtrzymujący trzymał mnie przy życiu, cud inżynierii, który związał moją świadomość z tą śmiertelną powłoką. Lecz nasz lud osiągnął coś znacznie większego. Dzięki naszemu wstąpieniu otworzyła się nowa droga, która mogłaby uwolnić mnie od ograniczeń tej maszyny i obdarzyć mnie formą godną imperium, które zbudowałem.\n\nPytanie, które przed nami stoi, jest proste: czy mam pozostać przykuty do aparatu, czy też przyjąć przyszłość, którą nasz lud otworzył?\n\n$paragon.ending.speech$"
		paragon.6041.a:99 "Zachować Aparat."
		paragon.6041.a.tooltip:99 "Mój tron wystarczy. §RUwaga: ten wybór się nie powtórzy§!"
		paragon.6041.b:99 "$paragon.6000.b$"
		paragon.6041.b.tooltip:99 "$paragon.6000.b.tooltip$"
		paragon.6041.c:99 "$paragon.6000.c$"
		paragon.6041.c.tooltip:99 "$paragon.6000.c.tooltip$"
		paragon.6041.d:99 "$paragon.6000.d$"
		paragon.6041.d.tooltip:99 "$paragon.6000.d.tooltip$"
		paragon.6041.e:99 "$paragon.6000.e$"
		paragon.6041.e.tooltip:99 "$paragon.6000.e.tooltip$"

	# LumEx - Convince Reformists Decision
		le_decision_convince_reformists:99 "Przekonać Reformistów"
		le_decision_convince_reformists_desc:99 "Luminarz spotyka się z przywódcami reformistów za zamkniętymi drzwiami, odwołując się do dziesięcioleci zaufania i wspólnych poświęceń. Niewielu potrafi utrzymać swoje przekonania w obliczu cichej powagi żywej legendy."
		le_decision_convince_reformists_tt:99 "Jedna §Yegalitarna§! populacja na tej planecie zostanie nawrócona na §Yautorytarną§! etykę.\n§GJeśli po nawróceniu na tej planecie nie pozostanie żadna egalitarna populacja§!, modyfikator §YDemokratyczne tendencje§! zostanie §Gusunięty§!."

