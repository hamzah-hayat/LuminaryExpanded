	# LumEx - Choose Luminary Ethic Trait
		paragon.5001.name:99 "Zasady przewodnie"
		paragon.5001.desc:99 "Gdy §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§! przejmuje stery władzy, wyłania się decydujące pytanie: jaka przewodnia etyka ukształtuje [Owner.Ruler.GetHisHer] legendarne rządy?\n\nRada czeka na deklarację Luminarza, świadoma, że ten wybór będzie pobrzmiewał w całym imperium przez pokolenia."
		# Use Vanilla text when able, to keep loc for other languages
		paragon.5001.militarist:99 "$paragon.5021.a$"
		paragon.5001.pacifist:99 "$paragon.5021.e$"
		paragon.5001.authoritarian:99 "$paragon.5021.c$"
		paragon.5001.spiritualist:99 "$paragon.5021.b$"
		paragon.5001.materialist:99 "$paragon.5021.f$"
		paragon.5001.xenophobe:99 "$paragon.5021.g$"
		paragon.5001.xenophile:99 "$paragon.5021.d$"

	# LumEx - Choose Heir Ethic
		paragon.5002.name:99 "Kształtowanie następcy"
		paragon.5002.desc:99 "Wyznaczono nowego następcę, który ma kontynuować dziedzictwo §Y[Owner.Ruler.GetTitle] [Owner.Ruler.GetRegnalName]§!. Zanim §Y[Owner.GetHeirName]§! rozpocznie szkolenie, należy podjąć kluczową decyzję: jaka przewodnia etyka ukształtuje jego światopogląd i przyszłe przywództwo?\n\nLuminarz musi wybierać mądrze, gdyż wybór ten określi charakter następcy na długie lata."
		paragon.5002.militarist:99 "$paragon.5001.militarist$"
		paragon.5002.pacifist:99 "$paragon.5001.pacifist$"
		paragon.5002.authoritarian:99 "$paragon.5001.authoritarian$"
		paragon.5002.spiritualist:99 "$paragon.5001.spiritualist$"
		paragon.5002.materialist:99 "$paragon.5001.materialist$"
		paragon.5002.xenophobe:99 "$paragon.5001.xenophobe$"
		paragon.5002.xenophile:99 "$paragon.5001.xenophile$"

	# LumEx - Choose Heir Leader Class
		paragon.5003.name:99 "Ścieżka następcy"
		paragon.5003.desc:99 "Skoro zasady przewodnie §Y[Owner.GetHeirName]§! są już ustalone, nadszedł czas, by określić ścieżkę szkolenia. Czy zostanie wykuty na dowódcę wojskowego, ukształtowany na błyskotliwego naukowca, czy przygotowany jako sprawny urzędnik?\n\nWybór Luminarza zadecyduje o specjalizacji i roli następcy w imperium."
		paragon.5003.commander:99 "Szkolić jako dowódcę"
		paragon.5003.scientist:99 "Szkolić jako naukowca"
		paragon.5003.official:99 "Szkolić jako urzędnika"

	# 40 Year Plan Insight events
		paragon.5324.name:99 "Plan 40-letni"
		paragon.5324.desc:99 "$paragon.beginning.speech$\n\nFundamenty zostały położone. Plan 40-letni, owa wielka wizja, którą przedstawiłem u zarania mych rządów, osiągnął swój szczyt. Nasz lud trudził się niestrudzenie, nasi naukowcy przesuwali granice wiedzy, a nasze imperium stoi u progu wielkości.\n\nLecz nie jest to jedynie koniec, to początek. Infrastruktura, którą zbudowaliśmy, wiedza, którą pielęgnowaliśmy, rozpęd, który zgromadziliśmy, wszystko to pozwala nam teraz osiągnąć coś naprawdę niezwykłego. Rozważyłem możliwości, jakie stoją przed nami, i nadszedł czas wybrać, która droga poprowadzi nasze imperium ku kolejnej erze chwały.\n\n$paragon.ending.speech$"

		paragon.5324.expand_armada:99 "Rozbudować Armadę"
		paragon.5324.expand_armada.tt:99 "Otrzymujesz §Y5000§! $i_alloys$ \nWszystkie §Ybazy gwiezdne§! ulepszone o jeden poziom\nOtrzymujesz postęp badań ku następnej technologii §Ybazy gwiezdnej§!\nOtrzymujesz postęp badań ku następnej technologii §Ykadłubów okrętów§!"
		paragon.5324.harness_star:99 "Okiełznać Gwiazdę"
		paragon.5324.harness_star.tt:99 "Stołeczna gwiazda otrzymuje duże złoże $i_energy$\nStołeczna gwiazda otrzymuje jedno z: złoże $i_volatile_motes$, $i_rare_crystals$, $i_exotic_gases$ lub $i_alloys$\nOtrzymujesz postęp badań ku odpowiedniej §YTechnologii Wydobycia§!"
		paragon.5324.strategic_resources:99 "Poszukiwanie zasobów strategicznych"
		paragon.5324.strategic_resources.tt:99 "Otrzymujesz §Y250§! $i_volatile_motes$\nOtrzymujesz §Y250§! $i_rare_crystals$\nOtrzymujesz §Y250§! $i_exotic_gases$\nOtrzymujesz złoże $i_volatile_motes$\nOtrzymujesz złoże $i_rare_crystals$\nOtrzymujesz złoże $i_exotic_gases$\nOtrzymujesz postęp badań ku wszystkim trzem §YTechnologiom Wydobycia§!"
		paragon.5324.living_metal:99 "Odkryć Żywy Metal"
		paragon.5324.living_metal.tt:99 "Otrzymujesz złoże $i_living_metal$\nOtrzymujesz postęp badań ku technologii wydobycia $i_living_metal$"
		paragon.5324.dark_matter:99 "Znaleźć Ciemną Materię"
		paragon.5324.dark_matter.tt:99 "Otrzymujesz złoże $i_dark_matter$\nOtrzymujesz postęp badań ku technologii wydobycia $i_dark_matter$"
		paragon.5324.zro:99 "Destylować Zro"
		paragon.5324.zro.tt:99 "Otrzymujesz złoże $i_zro$\nOtrzymujesz postęp badań ku technologii wydobycia $i_zro$"

	# 40 Year Plan - Expand Armada event
		paragon.5326.name:99 "Armada się rozrasta"
		paragon.5326.desc:99 "$paragon.beginning.speech$\n\nNadszedł czas, by wykuć armadę godną naszego przeznaczenia. Wydałem szeroki dekret: każda baza gwiezdna na naszym terytorium zostanie natychmiast ulepszona, ich obrona wzmocniona, a możliwości rozszerzone poza obecne granice. Nasi szkutnicy otrzymali nieograniczone środki na opracowanie kolejnej generacji okrętów wojennych, a nasi architekci wojskowi już kreślą plany fortyfikacji, które uczynią nasze granice nie do zdobycia.\n\nNiech galaktyka to dostrzeże. Tam, gdzie niegdyś mieliśmy posterunki, teraz wznoszą się twierdze. Tam, gdzie wystawialiśmy korwety, wkrótce wyślemy pancerniki. Nasza siła będzie niepodważalna.\n\n$paragon.ending.speech$"

	# 40 Year Plan - Zro event
		paragon.5327.name:99 "Destylacja Zro"
		paragon.5327.desc:99 "$paragon.beginning.speech$\n\nNasi naukowcy wykryli słabe ślady Zro, owej najbardziej tajemniczej z substancji, dryfującej w pustce w obrębie naszych granic. To nie zwyczajny materiał, kpi sobie z konwencjonalnej fizyki, rezonuje z energią psioniczną i posiada właściwości, których nawet nasze największe umysły z trudem pojmują. Zmobilizowałem nasze statki badawcze, by wskazały jego źródło i niezwłocznie ustanowiły wydobycie.\n\nCzy Zro odsłoni tajemnice umysłu, zasili technologie wykraczające poza nasze obecne pojęcie, czy otworzy drzwi do rzeczywistości, których jeszcze nie potrafimy sobie wyobrazić, to my je odkryjemy. Wszechświat zazdrośnie strzeże swych tajemnic, lecz wydobędziemy je z niego.\n\n$paragon.ending.speech$"

	# 40 Year Plan - Harness the Star event
		paragon.5328.name:99 "Okiełznanie Gwiazdy"
		paragon.5328.desc:99 "$paragon.beginning.speech$\n\nPrzez eony nasza rodzima gwiazda płonęła w pustce, piec o nieograniczonym potencjale, którego dopiero zaczynamy używać. Nakazałem naszym najlepszym inżynierom zbudować sieć zaawansowanych kolektorów energii na bliskiej orbicie, czerpiąc moc na skalę, jakiej nasza cywilizacja jeszcze nie osiągnęła.\n\nLecz to nie wszystko. W trakcie badań nad optymalnymi punktami zbioru nasi naukowcy dokonali niezwykłego odkrycia: ukryte w koronie gwiazdy leży skoncentrowane złoże materiałów strategicznych, wykute w procesach gwiezdnych i gotowe do wydobycia. To, co było tylko naszym słońcem, stanie się bijącym sercem naszej potęgi przemysłowej.\n\n$paragon.ending.speech$"
	
	# Milestone Events
		paragon.5031.name:99 "Pomnik Postępu"
		paragon.5031.desc:99 "$paragon.beginning.speech$\n\nDzisiejszy dzień stanowi przełomową chwilę w historii naszego wielkiego imperium. Ukończenie tej megastruktury jest dowodem pomysłowości i determinacji naszego ludu. Pod moim wizjonerskim przewodnictwem osiągnęliśmy to, co wielu uważało za niemożliwe, naginając samą tkaninę kosmosu do naszej woli.\n\n$paragon.ending.speech$"
		paragon.5031.a:99 "Triumf inżynierii!"

		paragon.5401.name:99 "Bestia powalona"
		paragon.5401.desc:99 "$paragon.beginning.speech$\n\nWielka i straszliwa istota, kolos pustki, padła przed potęgą naszych flot. Tam, gdzie inni drżeli, my staliśmy twardo, a pod moim kierownictwem nasze siły powaliły lewiatana. Niech galaktyka wie, że żadna bestia, jakkolwiek pradawna i straszliwa, nie jest poza zasięgiem naszego imperium.\n\n$paragon.ending.speech$"
		paragon.5401.a:99 "Nikt nam się nie oprze!"

		paragon.5403.name:99 "Świat ojczysty zdobyty"
		paragon.5403.desc:99 "$paragon.beginning.speech$\n\nŚwiat narodzin rywalizującej cywilizacji niesie teraz nasz sztandar. To nie tylko zdobycie terytorium, to wyrwanie najświętszej ziemi pewnego ludu. Pod moim zdecydowanym przywództwem nasze armie zabezpieczyły samą kolebkę innego gatunku, na zawsze zmieniając równowagę sił w galaktyce.\n\n$paragon.ending.speech$"
		paragon.5403.a:99 "Ich dziedzictwo jest teraz nasze!"

		paragon.5405.name:99 "Filary Kultury"
		paragon.5405.desc:99 "$paragon.beginning.speech$\n\nNasze tradycje prowadziły nas przez pokolenia, a teraz są w pełni urzeczywistnione. Nasze społeczeństwo osiągnęło rzadko spotykany pośród gwiazd zasięg dokonań kulturowych. Pod moim patronatem nasz lud zbadał wszystkie dostępne mu drogi myśli, filozofii i praktyki. Stoimy jako w pełni dopełniona cywilizacja.\n\n$paragon.ending.speech$"
		paragon.5405.a:99 "Nasza kultura nie ma sobie równych!"

		paragon.5407.name:99 "Echa Pradawnych"
		paragon.5407.desc:99 "$paragon.beginning.speech$\n\nOdkryliśmy ostatnie pozostałości cywilizacji, która istniała przed nami, prekursora, którego osiągnięcia kiedyś kształtowały samą galaktykę. Ich tajemnice są teraz nasze do badania i zachowania. Pod moim przewodnictwem zakończyliśmy największe przedsięwzięcie archeologiczne w historii naszego ludu, łącząc naszą przyszłość z utraconą i pradawną przeszłością.\n\n$paragon.ending.speech$"
		paragon.5407.a:99 "Niesiemy ich pochodnię dalej!"

		paragon.5409.name:99 "Kryzys zażegnany"
		paragon.5409.desc:99 "$paragon.beginning.speech$\n\nGalaktyka chwiała się na krawędzi unicestwienia, a jednak przetrwaliśmy. Kryzys, który groził pochłonięciem całej cywilizacji, został pokonany. Pod moją niezłomną wolą nasze imperium stanęło jako wał obronny przeciw mrokowi. To zwycięstwo nie należy tylko do nas, lecz do każdego świata, który wciąż oddycha pod gwiazdami. Tam, gdzie padli niezliczeni inni, my utrzymaliśmy linię, a tym samym zapewniliśmy przyszłość wszelkiego świadomego życia.\n\n$paragon.ending.speech$"
		paragon.5409.a:99 "Galaktyka stoi, bo my staliśmy!"

	# Forgotten Events
		paragon.forgotten.a.2:99 "Uwolnić kilku „dysydentów”"
